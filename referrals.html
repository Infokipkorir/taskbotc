<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTasks Referral Program</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#eef2ff,#f8fafc);
}

.container{
  max-width:520px;
  margin:0 auto;
  padding:16px;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;
  padding:18px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(37,99,235,.25);
}

.hero h2{margin:0;font-size:18px;font-weight:800;}
.hero p{font-size:12.5px;opacity:.9;margin-top:6px;}

/* CARD */
.card{
  background:#fff;
  margin-top:14px;
  padding:16px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

/* CODE BOX (IMPORTANT UX RULE) */
.code-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#f1f5f9;
  padding:12px;
  border-radius:12px;
  font-weight:800;
  margin-top:10px;
}

/* BUTTONS */
.btns{
  display:flex;
  gap:10px;
  margin-top:12px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
}

.copy{background:#2563eb;color:#fff;}
.share{background:#10b981;color:#fff;}

/* STATS */
.stats{
  display:flex;
  justify-content:space-between;
  margin-top:12px;
  font-size:13px;
  color:#475569;
}

/* ENROLL */
.enroll-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:14px;
  background:#111827;
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

/* TRUST BANNER */
.trust{
  font-size:11px;
  margin-top:10px;
  color:#64748b;
}
</style>
</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h2>Invite Friends & Earn Money 💰</h2>
    <p>Share your referral link and earn rewards instantly when users join.</p>
  </div>

  <!-- ENROLL -->
  <div class="card" id="enrollCard">
    <button class="enroll-btn" onclick="enroll()">
      Join Referral Program
    </button>
    <div class="trust">You must enroll to activate your referral system</div>
  </div>

  <!-- REFERRAL SYSTEM -->
  <div class="card" id="refCard" style="display:none">

    <div style="font-weight:800;">Your Referral Link</div>

    <div class="code-box">
      <span id="code">---</span>
      <i class="bi bi-clipboard" onclick="copy()" style="cursor:pointer"></i>
    </div>

    <div class="btns">
      <button class="copy" onclick="copy()">
        <i class="bi bi-copy"></i> Copy
      </button>

      <button class="share" onclick="share()">
        <i class="bi bi-share"></i> Share
      </button>
    </div>

    <div class="stats">
      <span>Referrals: <b id="count">0</b></span>
      <span>Earnings: <b id="earnings">KSh 0</b></span>
    </div>

    <div class="trust">
      Earn KSh 100 per active referral. No limits.
    </div>

  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://lwnbfjjsstxkyexeojcl.supabase.co",
  "sb_publishable_Pj9ocGkssu5Gh6qZXFnZQQ_LdghnZt9"
);

let userId;
let code;

// INIT
async function init(){

  const { data: { user } } = await supabase.auth.getUser();
  if(!user) location.href="login.html";

  userId = user.id;

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", userId)
    .single();

  if(profile?.referral_enrolled){
    code = profile.referral_code;
    show();
    loadStats();
  }
}

async function enroll(){

  code = "OT" + Math.random().toString(36).substring(2,8).toUpperCase();

  await supabase.from("profiles")
    .update({
      referral_enrolled:true,
      referral_code:code
    })
    .eq("id", userId);

  show();
  loadStats();
}

function show(){
  document.getElementById("enrollCard").style.display="none";
  document.getElementById("refCard").style.display="block";
  document.getElementById("code").textContent = code;
}

function copy(){
  navigator.clipboard.writeText(`https://www.onetasks.co.ke/${code}`);
  alert("Copied!");
}

function share(){
  const link = `https://www.onetasks.co.ke/${code}`;
  navigator.share ? navigator.share({title:"OneTasks", url:link}) :
  navigator.clipboard.writeText(link);
}

async function loadStats(){
  const { data } = await supabase
    .from("referrals")
    .select("*")
    .eq("referrer_id", userId);

  document.getElementById("count").textContent = data?.length || 0;
  document.getElementById("earnings").textContent =
    "KSh " + ((data?.length || 0) * 100);
}

init();
</script>

</body>
</html>
