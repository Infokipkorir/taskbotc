<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTasks Referral System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f4f7ff;
  color:#0f172a;
}

.container{
  max-width:520px;
  margin:0 auto;
  padding:16px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.title{
  font-size:18px;
  font-weight:800;
}

.code{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#eef2ff;
  padding:12px;
  border-radius:12px;
  margin-top:12px;
  font-weight:800;
}

.btns{
  display:flex;
  gap:10px;
  margin-top:14px;
}

button{
  flex:1;
  border:none;
  padding:10px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

.copy{background:#2563eb;color:#fff;}
.share{background:#10b981;color:#fff;}

.stats{
  display:flex;
  justify-content:space-between;
  margin-top:14px;
  font-size:13px;
  color:#64748b;
}

img{
  width:100%;
  border-radius:12px;
  margin-top:12px;
}
</style>
</head>

<body>

<div class="container"

  <div class="card">

    <div class="title">Your Referral Code</div>

    <div class="code">
      <span id="code">Loading...</span>
      <i class="bi bi-clipboard" onclick="copyCode()" style="cursor:pointer"></i>
    </div>

    <div class="btns">
      <button class="copy" onclick="copyCode()">
        <i class="bi bi-copy"></i> Copy
      </button>

      <button class="share" onclick="shareLink()">
        <i class="bi bi-share"></i> Share
      </button>
    </div>

    <div class="stats">
      <span>Referrals: <b id="count">0</b></span>
      <span>Earnings: <b id="earnings">$0.0</b></span>
    </div>

  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://lwnbfjjsstxkyexeojcl.supabase.co",
  "sb_publishable_Pj9ocGkssu5Gh6qZXFnZQQ_LdghnZt9"
);

let userId;
let referralCode;

// ================= INIT =================
async function init(){

  const { data: { user } } = await supabase.auth.getUser();

  if(!user){
    location.href="login.html";
    return;
  }

  userId = user.id;

  let { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", userId)
    .single();

  // CREATE REF CODE IF NOT EXISTS
  if(!profile.referral_code){

    referralCode = "OT" + Math.random().toString(36).substring(2,8).toUpperCase();

    await supabase
      .from("profiles")
      .update({ referral_code: referralCode })
      .eq("id", userId);

  }else{
    referralCode = profile.referral_code;
  }

  document.getElementById("code").textContent = referralCode;

  loadStats();
}

// ================= COPY =================
function copyCode(){
  const link = `https://www.onetasks.co.ke/${referralCode}`;
  navigator.clipboard.writeText(link);
  alert("Copied: " + link);
}

// ================= SHARE =================
function shareLink(){

  const link = `https://www.onetasks.co.ke/${referralCode}`;

  const text = `Join OneTasks and earn money 💰\nUse my link:\n${link}`;

  if(navigator.share){
    navigator.share({
      title:"OneTasks Referral",
      text:text,
      url:link
    });
  }else{
    navigator.clipboard.writeText(text);
    alert("Link copied for sharing");
  }
}

// ================= STATS =================
async function loadStats(){

  const { data } = await supabase
    .from("referrals")
    .select("*")
    .eq("referrer_id", userId);

  let count = data?.length || 0;
  let earnings = count * 100;

  document.getElementById("count").textContent = count;
  document.getElementById("earnings").textContent = "KSh " + earnings;
}

init();
</script>

</body>
  </html>
