<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTasks Referral Program</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 <style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#eef2ff,#f8fafc);
}

/* CONTAINER */
.container{
  max-width:520px;
  margin:0 auto;
  padding:14px;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;
  padding:18px;
  border-radius:18px;
}

/* CARD */
.card{
  background:#fff;
  margin-top:14px;
  padding:16px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

/* TITLE */
h2,h3{margin:0}

/* REF CODE BOX */
.code-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;

  background:#f1f5f9;
  padding:12px;
  border-radius:12px;

  font-weight:800;

  word-break:break-all;
  flex-wrap:wrap;
}

/* CODE TEXT */
#code{
  font-size:14px;
  letter-spacing:1px;
  flex:1;
  min-width:120px;
}

/* BUTTON ROW */
.btns{
  display:flex;
  gap:10px;
  margin-top:12px;
}

/* BUTTONS */
button{
  flex:1;
  padding:11px;
  border:none;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
  font-size:13px;
}

/* COLORS */
.copy{background:#2563eb;color:#fff;}
.share{background:#10b981;color:#fff;}
.enroll{background:#111827;color:#fff;width:100%;}

/* STATS */
.stats{
  display:flex;
  justify-content:space-between;
  margin-top:14px;
  font-size:13px;
  color:#475569;
  flex-wrap:wrap;
  gap:8px;
}

/* ICON CLICK */
.bi{
  font-size:18px;
}

/* TRUST TEXT */
.trust{
  font-size:11px;
  margin-top:10px;
  color:#64748b;
  line-height:1.4;
}

/* ================= RESPONSIVE BREAKPOINTS ================= */

/* TABLETS */
@media (max-width:768px){

  .container{
    padding:12px;
  }

  .hero{
    padding:16px;
  }

  .card{
    padding:14px;
  }

  button{
    font-size:12.5px;
    padding:10px;
  }

  #code{
    font-size:13px;
  }
}

/* MOBILE */
@media (max-width:480px){

  .hero h2{
    font-size:16px;
  }

  .hero p{
    font-size:12px;
  }

  .btns{
    flex-direction:column;
  }

  .code-box{
    flex-direction:column;
    align-items:flex-start;
  }

  .stats{
    flex-direction:column;
    align-items:flex-start;
  }

  button{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h2>Invite Friends & Earn Money 💰</h2>
    <p>Share your referral link and earn rewards instantly when users join.</p>
  </div>

  <!-- ENROLL -->
  <div class="card" id="enrollCard">
    <button class="enroll-btn" onclick="enroll()">
      Join Referral Program
    </button>
    <div class="trust">You must enroll to activate your referral system</div>
  </div>

  <!-- REFERRAL SYSTEM -->
  <div class="card" id="refCard" style="display:none">

    <div style="font-weight:800;">Your Referral Link</div>

    <div class="code-box">
      <span id="code">---</span>
      <i class="bi bi-clipboard" onclick="copy()" style="cursor:pointer"></i>
    </div>

    <div class="btns">
      <button class="copy" onclick="copy()">
        <i class="bi bi-copy"></i> Copy
      </button>

      <button class="share" onclick="share()">
        <i class="bi bi-share"></i> Share
      </button>
    </div>

    <div class="stats">
      <span>Referrals: <b id="count">0</b></span>
      <span>Earnings: <b id="earnings">KSh 0</b></span>
    </div>

    <div class="trust">
      Earn KSh 100 per active referral. No limits.
    </div>

  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://lwnbfjjsstxkyexeojcl.supabase.co",
  "sb_publishable_Pj9ocGkssu5Gh6qZXFnZQQ_LdghnZt9"
);

let userId;
let code;

// INIT
async function enroll(){

  const btn = document.querySelector(".enroll");
  btn.innerHTML = "Generating...";
  btn.disabled = true;

  code = "OT" + Math.random().toString(36).substring(2,8).toUpperCase();

  const { error } = await supabase
    .from("profiles")
    .update({
      referral_enrolled:true,
      referral_code:code
    })
    .eq("id", userId);

  btn.innerHTML = "Join Referral Program";
  btn.disabled = false;

  if(error){
    alert("Error creating code");
    return;
  }

  show();
  loadStats();
  }
</script>

</body>
</html>
