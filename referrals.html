<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTasks Referral System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f4f7ff;
  color:#0f172a;
}

.container{
  max-width:520px;
  margin:0 auto;
  padding:16px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.title{
  font-size:18px;
  font-weight:800;
}

.code{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#eef2ff;
  padding:12px;
  border-radius:12px;
  margin-top:12px;
  font-weight:800;
}

.btns{
  display:flex;
  gap:10px;
  margin-top:14px;
}

button{
  flex:1;
  border:none;
  padding:10px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

.copy{background:#2563eb;color:#fff;}
.share{background:#10b981;color:#fff;}

.stats{
  display:flex;
  justify-content:space-between;
  margin-top:14px;
  font-size:13px;
  color:#64748b;
}

img{
  width:100%;
  border-radius:12px;
  margin-top:12px;
}
</style>
</head>
<body>
<button id="enrollBtn" onclick="enrollProgram()">
  Join Referral Program
</button>

<div id="box" style="display:none">
  <span id="code">---</span>
  <i onclick="copyCode()" class="bi bi-clipboard"></i>
</div>

<div id="actions" style="display:none">
  <button onclick="copyCode()">Copy</button>
  <button onclick="shareLink()">Share</button>
</div>

<div id="stats" style="display:none">
  <span>Referrals: <b id="count">0</b></span>
  <span>Earnings: <b id="earnings">0</b></span>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://lwnbfjjsstxkyexeojcl.supabase.co",
  "sb_publishable_Pj9ocGkssu5Gh6qZXFnZQQ_LdghnZt9"
);

let userId;
let referralCode;

// ================= INIT =================
async function init(){

  const { data: { user } } = await supabase.auth.getUser();

  if(!user){
    location.href="login.html";
    return;
  }

  userId = user.id;

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", userId)
    .single();

  if(profile?.referral_enrolled){

    referralCode = profile.referral_code;

    showUI();
    loadStats();
  }
}

// ================= ENROLL USER =================
async function enrollProgram(){

  referralCode = "OT" + Math.random().toString(36).substring(2,8).toUpperCase();

  const { error } = await supabase
    .from("profiles")
    .update({
      referral_enrolled: true,
      referral_code: referralCode
    })
    .eq("id", userId);

  if(error){
    alert("Error enrolling");
    return;
  }

  showUI();
  loadStats();
}

// ================= SHOW UI =================
function showUI(){

  document.getElementById("enrollBtn")?.remove();

  document.getElementById("code").textContent = referralCode;

  document.getElementById("box").style.display = "flex";
  document.getElementById("actions").style.display = "flex";
  document.getElementById("stats").style.display = "flex";
}

// ================= COPY =================
function copyCode(){
  const link = `https://www.onetasks.co.ke/${referralCode}`;
  navigator.clipboard.writeText(link);
  alert("Copied: " + link);
}

// ================= SHARE =================
function shareLink(){

  const link = `https://www.onetasks.co.ke/${referralCode}`;

  const text = `🔥 Join OneTasks & earn money\nUse my link:\n${link}`;

  if(navigator.share){
    navigator.share({
      title:"OneTasks Referral",
      text:text,
      url:link
    });
  }else{
    navigator.clipboard.writeText(text);
    alert("Link copied");
  }
}

// ================= STATS =================
async function loadStats(){

  const { data } = await supabase
    .from("referrals")
    .select("*")
    .eq("referrer_id", userId);

  let count = data?.length || 0;

  document.getElementById("count").textContent = count;
  document.getElementById("earnings").textContent =
    "KSh " + (count * 100);
}

init();
</script></body>
  </html>
