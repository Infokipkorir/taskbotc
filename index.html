/* ── SUPABASE REST CLIENT ── */
var sb=(function(){
  var base=SU+'/rest/v1/';
  var storBase=SU+'/storage/v1/';
  function H(){return{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=representation'};}
  function qb(table){
    var sel='*',filters=[],ord=null,lim=null,single=false;
    var q={
      select:function(s){sel=s;return q;},
      eq:function(k,v){filters.push(encodeURIComponent(k)+'=eq.'+encodeURIComponent(v));return q;},
      neq:function(k,v){filters.push(encodeURIComponent(k)+'=neq.'+encodeURIComponent(v));return q;},
      gt:function(k,v){filters.push(encodeURIComponent(k)+'=gt.'+encodeURIComponent(v));return q;},
      or:function(s){filters.push('or=('+encodeURIComponent(s)+')');return q;},
      order:function(k,o){ord=encodeURIComponent(k)+'.'+(o&&o.ascending===false?'desc':'asc');return q;},
      limit:function(n){lim=n;return q;},
      single:function(){single=true;return q;},
      get:function(){
        var url=base+table+'?select='+encodeURIComponent(sel);
        filters.forEach(function(f){url+='&'+f;});
        if(ord)url+='&order='+ord;
        if(lim)url+='&limit='+lim;
        var h=H();
        if(single)h['Accept']='application/vnd.pgrst.object+json';
        return fetch(url,{method:'GET',headers:h})
          .then(function(r){return r.text().then(function(t){
            if(r.status===406)return{data:null,error:null};
            var d=null;try{d=t?JSON.parse(t):null;}catch(e){d=null;}
            return r.ok?{data:d,error:null}:{data:null,error:d||{message:'HTTP '+r.status+': '+t.slice(0,80)}};
          });})
          .catch(function(e){return{data:null,error:{message:'fetch: '+e.message}};});
      },
      then:function(res,rej){return q.get().then(res,rej);}
    };
    return q;
  }
  function ub(table,obj){
    var filters=[];
    var u={
      eq:function(k,v){filters.push(encodeURIComponent(k)+'=eq.'+encodeURIComponent(v));return u;},
      exec:function(){
        var url=base+table+'?'+filters.join('&');
        return fetch(url,{method:'PATCH',headers:H(),body:JSON.stringify(obj)})
          .then(function(r){
            if(r.status===204)return{data:null,error:null};
            return r.text().then(function(t){var d=null;try{d=t?JSON.parse(t):null;}catch(e){d=null;}return r.ok?{data:d,error:null}:{data:null,error:d||{message:'HTTP '+r.status}};});
          })
          .catch(function(e){return{data:null,error:{message:e.message}};});
      },
      then:function(res,rej){return u.exec().then(res,rej);}
    };
    return u;
  }
  function db(table){
    var filters=[];
    var d={
      eq:function(k,v){filters.push(encodeURIComponent(k)+'=eq.'+encodeURIComponent(v));return d;},
      exec:function(){
        var url=base+table+'?'+filters.join('&');
        return fetch(url,{method:'DELETE',headers:{apikey:SK,Authorization:'Bearer '+SK}})
          .then(function(r){return{data:null,error:r.ok?null:{message:'Delete failed '+r.status}};})
          .catch(function(e){return{data:null,error:{message:e.message}};});
      },
      then:function(res,rej){return d.exec().then(res,rej);}
    };
    return d;
  }
  return{
    from:function(table){
      return{
        select:function(s){return qb(table).select(s||'*');},
        update:function(obj){return ub(table,obj);},
        delete:function(){return db(table);},
        insert:function(rows){
          var body=Array.isArray(rows)?rows:[rows];
          return fetch(base+table,{method:'POST',headers:H(),body:JSON.stringify(body)})
            .then(function(r){return r.text().then(function(t){var d=null;try{d=t?JSON.parse(t):null;}catch(e){d=null;}return r.ok?{data:d,error:null}:{data:null,error:d||{message:'HTTP '+r.status+': '+t.slice(0,100)}};});})
            .catch(function(e){return{data:null,error:{message:e.message}};});
        }
      };
    },
    storage:{
      from:function(bucket){
        return{
          upload:function(path,file,opts){
            return fetch(storBase+'object/'+bucket+'/'+path,{
              method:'POST',
              headers:{apikey:SK,Authorization:'Bearer '+SK,'Content-Type':file.type||'application/octet-stream','x-upsert':(opts&&opts.upsert)?'true':'false'},
              body:file
            })
            .then(function(r){return r.text().then(function(t){var d=null;try{d=t?JSON.parse(t):null;}catch(e){d=null;}return r.ok?{data:d,error:null}:{data:null,error:d||{message:'Upload failed'}};});})
            .catch(function(e){return{data:null,error:{message:e.message}};});
          }
        };
      }
    }
  };
})();

const STORAGE_KEY = "secure_app_users";

function loadUsers() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    try {
        return JSON.parse(raw);
    } catch (e) {
        return [];
    }
}

function saveUsers(users) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
}

window.togglePw = function(inputId, btn) {
    const input = document.getElementById(inputId);
    if (!input) return;
    const icon = btn.querySelector('i');
    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    } else {
        input.type = "password";
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    }
};

// ==================== VALIDATION RULES ====================
function isStrongPassword(pwd) {
    if (pwd.length < 6) return false;
    const hasLetter = /[A-Za-z]/.test(pwd);
    const hasNumber = /\d/.test(pwd);
    return hasLetter && hasNumber;
}

function isAllowedEmail(email) {
    const trimmed = email.trim().toLowerCase();
    const parts = trimmed.split('@');
    if (parts.length !== 2) return false;
    const domain = parts[1];
    const allowedDomains = ['gmail.co', 'outlook.com', 'hotmail.com'];
    return allowedDomains.includes(domain);
}

function isValidUsernameFormat(username) {
    const regex = /^[a-zA-Z0-9_]{3,20}$/;
    return regex.test(username);
}

function isUsernameUnique(username, excludeUserId = null) {
    const users = loadUsers();
    const lowerUsername = username.trim().toLowerCase();
    return !users.some(user => user.username.toLowerCase() === lowerUsername && (excludeUserId === null || user.id !== excludeUserId));
}

function getFlagEmoji(countryCode) {
    if (!countryCode) return "🏳️";
    const codePoints = countryCode.toUpperCase().split('').map(ch => 127397 + ch.charCodeAt(0));
    return String.fromCodePoint(...codePoints);
}

function populateCountryDropdown() {
    const selectEl = document.getElementById("su-country");
    if (!selectEl) return;
    selectEl.innerHTML = "";
    countryData.forEach(country => {
        const flag = getFlagEmoji(country.code);
        const option = document.createElement("option");
        option.value = country.code;
        option.textContent = `${flag}  ${country.name}`;
        selectEl.appendChild(option);
    });
    // Set default to United States
    if (countryData.find(c => c.code === "US")) selectEl.value = "US";
}

// ==================== SIGNUP LOGIC ====================
window.doSignup = function() {
    clearMsg("as-msg");

    const displayName = document.getElementById("su-nm").value.trim();
    const email = document.getElementById("su-em").value.trim();
    const username = document.getElementById("su-us").value.trim();
    const password = document.getElementById("su-pw").value;
    const confirmPw = document.getElementById("su-pw2").value;
    const countryCode = document.getElementById("su-country").value;
    const countryObj = countryData.find(c => c.code === countryCode);
    const countryName = countryObj ? countryObj.name : "Unknown";

    // Required fields
    if (!displayName || !email || !username || !password || !confirmPw) {
        showMessage("as-msg", "❌ All fields are required.", true);
        return;
    }

    // Email domain restriction
    if (!isAllowedEmail(email)) {
        showMessage("as-msg", "📛 Only emails with @gmail.co, @outlook.com or @Hotmail.com are allowed.", true);
        return;
    }

    // Username format & uniqueness
    if (!isValidUsernameFormat(username)) {
        showMessage("as-msg", "⚠️ Username must be 3-20 characters: letters, numbers, underscore only.", true);
        return;
    }
    if (!isUsernameUnique(username)) {
        showMessage("as-msg", "🚫 This username is already taken. Please choose a unique username.", true);
        return;
    }

    // Strong password check
    if (!isStrongPassword(password)) {
        showMessage("as-msg", "🔐 Password must be at least 6 characters and contain both letters and numbers.", true);
        return;
    }

    if (password !== confirmPw) {
        showMessage("as-msg", "❌ Passwords do not match.", true);
        return;
    }

    // Extra email sanity
    if (!email.includes("@") || email.split("@")[1] === "") {
        showMessage("as-msg", "📧 Enter a valid email address.", true);
        return;
    }

    // Save new user
    const users = loadUsers();
    const newUser = {
        id: Date.now(),
        displayName: displayName,
        email: email.toLowerCase(),
        username: username.toLowerCase(),
        password: password,      // In production, hash this!
        country: countryName,
        countryCode: countryCode,
        createdAt: new Date().toISOString()
    };
    users.push(newUser);
    saveUsers(users);

    // Success message and reset form
    showMessage("as-msg", `🎉 Account created successfully! Welcome ${displayName}. Please sign in.`, false);
    document.getElementById("su-nm").value = "";
    document.getElementById("su-em").value = "";
    document.getElementById("su-us").value = "";
    document.getElementById("su-pw").value = "";
    document.getElementById("su-pw2").value = "";

    // Switch to login card after delay
    setTimeout(() => {
        showAuthCard('login');
        const loginMsgDiv = document.getElementById("login-msg");
        if (loginMsgDiv) {
            loginMsgDiv.style.display = "block";
            loginMsgDiv.innerHTML = "✅ Signup success! Log in with your credentials.";
            setTimeout(() => { if (loginMsgDiv) loginMsgDiv.style.display = "none"; }, 3500);
        }
    }, 1200);
};

}

function toggleNotifLike(id) {

  var count = document.getElementById('like-count-' + id);

  var liked = btn.classList.toggle('liked');
  var svg   = btn.querySelector('svg');
  if (svg) svg.setAttribute('fill', liked ? 'currentColor' : 'none');
  var cur = parseInt(count.textContent) || 0;
  var next = liked ? cur + 1 : Math.max(0, cur - 1);
  count.textContent = next > 0 ? next : '';
}

/* ── HELPERS ── */
function fmtSec(s){
  s=Math.max(0,Math.floor(s));
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h+':'+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
}
function fmtDate(s){
  if(!s)return '-';
  return new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}
function showAlert(id,msg,type){
  var el=document.getElementById(id);
  if(!el)return;
  if(!msg){el.innerHTML='';return;}
  el.innerHTML='<div class="alert a-'+type+'">'+msg+'</div>';
}

async function doLogin(){
  var em=document.getElementById('li-em').value.trim();
  var pw=document.getElementById('li-pw').value;
  var rem=document.getElementById('li-rem');
  var rememberMe=rem&&rem.checked;
  showAlert('al-msg','','err');
  if(!em||!pw){showAlert('al-msg','Please fill in all fields.','err');return;}
  var btn=document.getElementById('li-btn');
  btn.disabled=true;btn.textContent='Signing in...';
  try{
    var res=await sb.from('users').select('*').eq('email',em).single();
    btn.disabled=false;btn.textContent='Sign in';
    if(res.error&&res.error.message){showAlert('al-msg','Server error: '+res.error.message,'err');return;}
    if(!res.data||!res.data.id){showAlert('al-msg','No account found with that email.','err');return;}
    if(res.data.password_hash!==pw){showAlert('al-msg','Incorrect password. <a onclick="showAuthCard(\'forgot\')" style="color:var(--red);cursor:pointer;font-weight:700;text-decoration:underline">Forgot?</a>','err');return;}
    CU=res.data;
    if(rememberMe){
      localStorage.setItem('ow_uid',res.data.id);
    } else {
      sessionStorage.setItem('ow_uid',res.data.id);
      localStorage.removeItem('ow_uid');
    }
    showAlert('al-msg','Welcome back!','ok');
    setTimeout(function(){showApp();},400);
  }catch(e){
    btn.disabled=false;btn.textContent='Sign in';
    showAlert('al-msg','Error: '+e.message,'err');
  }
}

async function doSignup(){
  var nm=document.getElementById('su-nm').value.trim();
  var em=document.getElementById('su-em').value.trim();
  var us=document.getElementById('su-us').value.trim().replace('@','');
  var pw=document.getElementById('su-pw').value;
  var pw2=document.getElementById('su-pw2').value;
  showAlert('as-msg','','err');
  if(!nm||!em||!us||!pw){showAlert('as-msg','Please fill in all fields.','err');return;}
  if(!/\S+@\S+\.\S+/.test(em)){showAlert('as-msg','Enter a valid email address.','err');return;}
  if(pw.length<6){showAlert('as-msg','Password must be at least 6 characters.','err');return;}
  if(pw!==pw2){showAlert('as-msg','Passwords do not match.','err');return;}
  var btn=document.getElementById('su-btn');
  btn.disabled=true;btn.textContent='Checking...';
  try{
    var chk=await sb.from('users').select('id').eq('email',em).single();
    if(chk.data&&chk.data.id){
      btn.disabled=false;btn.textContent='Create account';
      showAlert('as-msg','Email already registered. <a onclick="showAuthCard(\'login\')" style="color:var(--red);cursor:pointer;font-weight:700;text-decoration:underline">Sign in?</a>','err');
      return;
    }
    btn.textContent='Creating...';
    var colors=['#0288D1','#388E3C','#7B1FA2','#E64A19','#00838F'];
    var col=colors[Math.floor(Math.random()*colors.length)];
    var res=await sb.from('users').insert({
      email:em,password_hash:pw,display_name:nm,username:us,
      telegram_id:'usr_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
      level:1,balance:0,hold_balance:0,total_earned:0,
      avatar_color:col,settings:{},email_verified:false
    });
    btn.disabled=false;btn.textContent='Create account';
    if(res.error){
      var msg=(res.error.message||JSON.stringify(res.error)).toLowerCase();
      if(msg.indexOf('unique')>=0||msg.indexOf('duplicate')>=0)showAlert('as-msg','Email or username already taken.','err');
      else showAlert('as-msg','Sign up failed: '+(res.error.message||'Unknown error'),'err');
      return;
    }
    var udata=Array.isArray(res.data)?res.data[0]:res.data;
    if(!udata||!udata.id){showAlert('as-msg','Account created! Please sign in.','ok');showAuthCard('login');return;}
    CU=udata;localStorage.setItem('ow_uid',udata.id);
    showAlert('as-msg','Account created!','ok');
    setTimeout(function(){showApp();checkCookieConsent();},600);
  }catch(e){
    btn.disabled=false;btn.textContent='Create account';
    showAlert('as-msg','Error: '+e.message,'err');
  }
}

function renderTasks(tasks,subMap){
  subMap=subMap||{};
  var filtered=curFilter==='all'?tasks:tasks.filter(function(t){return t.category===curFilter;});
  var el=document.getElementById('tasks-list');
  if(!filtered.length){
    el.innerHTML='<div style="text-align:center;padding:36px 20px">' +
      '<div style="font-size:36px;margin-bottom:12px">&#x1F50D;</div>' +
      '<div style="font-size:14px;font-weight:700;color:var(--tx);margin-bottom:6px">No tasks available right now</div>' +
      '<div style="font-size:12px;color:var(--mu);margin-bottom:20px;line-height:1.5">New tasks are added regularly.<br>Check back soon or refresh.</div>' +
      '<button onclick="loadTasks()" style="padding:10px 22px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px">' +
      '<svg viewBox="0 0 24 24" fill="currentColor" style="width:14px;height:14px"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>' +
      'Refresh Tasks</button></div>';
    return;
  }
  var showTimer=!CU||(CU.settings||{}).timer!==false;
  var html='';
  filtered.forEach(function(t){
    var sub=subMap[t.id];
    var isCancelled=sub&&sub.status==='cancelled';
    var isDone=sub&&sub.status==='approved'&&!t.is_repeatable;
    var isPend=sub&&sub.status==='pending'&&!t.is_repeatable;
    var isDisp=sub&&sub.status==='disputed';
    var isFullyBooked=t.slots_total>0&&(t.slots_used||0)>=t.slots_total;
    var isAct=!!activeTasks[t.id];
    var spent=isAct?activeTasks[t.id].spent:(sub?sub.time_spent_seconds||0:0);
    var lim=t.time_limit_seconds||7200;
    var rem=Math.max(0,lim-spent);
    var pct=(rem/lim*100).toFixed(1);
    var pc=pct>50?'#0288D1':pct>20?'#F57C00':'#C62828';
    var minT=t.min_time_seconds||60;
    var btnTxt,btnCls,btnDis;
    if(isDone){btnTxt='Completed';btnCls='tbtn tbtn-done';btnDis='disabled';}
    else if(isDisp){btnTxt='Disputed';btnCls='tbtn tbtn-pending';btnDis='disabled';}
    else if(isPend){btnTxt='Pending';btnCls='tbtn tbtn-pending';btnDis='disabled';}
    else if(isCancelled&&rem>0){btnTxt='Resubmit';btnCls='tbtn tbtn-accept';btnDis='';}
    else if(isCancelled){btnTxt='Expired';btnCls='tbtn tbtn-expired';btnDis='disabled';}
    else if(isFullyBooked){btnTxt='Full';btnCls='tbtn tbtn-expired';btnDis='disabled';}
    else if(isAct){btnTxt='Continue';btnCls='tbtn tbtn-accept';btnDis='';}
    else{btnTxt='Accept';btnCls='tbtn tbtn-accept';btnDis='';}
    var repBadge=t.is_repeatable?'<span class="rpill">every '+t.repeat_cooldown_hours+'h</span>':'';
    var slotsLeft=t.slots_total>0?t.slots_total-(t.slots_used||0):null;
    var slotsBadge=(slotsLeft!==null&&slotsLeft<=5&&slotsLeft>0)?'<span class="rpill" style="background:#FFF3E0;color:#E65100;border-color:#FFB74D">'+slotsLeft+' slots left</span>':'';
    var minBadge=minT>60?'<span class="rpill" style="background:#F3E5F5;color:#6B46C1;border-color:#CE93D8">min '+minT+'s</span>':'';
    var tags=(t.tags||[]).map(function(g){return '<span class="tag tag-blue">'+g+'</span>';}).join('');
    var steps=(t.steps||[]).map(function(s,i){return '<div class="step-item"><div class="step-num">'+(i+1)+'</div><div class="step-txt">'+s+'</div></div>';}).join('');
    var timerHtml='';
    if(showTimer){
      timerHtml='<div class="tc-timer">'+
        '<div class="tc-clocks">'+
        '<div class="tc-ck"><span class="tc-ckl">Remain:</span><span class="tc-ckv rem'+(rem<600?' urg':'')+'" id="rem-'+t.id+'">'+fmtSec(rem)+'</span></div>'+
        '<div style="width:0.5px;height:12px;background:var(--b)"></div>'+

      '<div class="tc-head">'+

function filterTasks(cat,btn){

/* ── TASK TIMER ── */
function startMaster(){
  if(masterTick)return;
  masterTick=setInterval(async function(){
    var any=false;
    for(var id in activeTasks){
      var t=activeTasks[id];if(t.done)continue;
      any=true;t.spent++;
      var rem=Math.max(0,t.limit-t.spent);
      var pct=rem/t.limit*100;
      var pc=pct>50?'#0288D1':pct>20?'#F57C00':'#C62828';
      var re=document.getElementById('rem-'+id);if(re){re.textContent=fmtSec(rem);re.className='tc-ckv rem'+(rem<600?' urg':'');}
      var se=document.getElementById('spt-'+id);if(se)se.textContent=fmtSec(t.spent);
      var pf=document.getElementById('pf-'+id);if(pf){pf.style.width=pct.toFixed(1)+'%';pf.style.background=pc;}
      if(rem<=0){
        t.done=true;
        var card=document.getElementById('tc-'+id);var btn2=document.getElementById('btn-'+id);
        if(card){card.className='tcard t-expired';var ov=card.querySelector('.tc-expov');if(!ov){var d=document.createElement('div');d.className='tc-expov';d.textContent='Task expired';card.appendChild(d);}}
        if(btn2){btn2.textContent='Expired';btn2.className='tbtn tbtn-expired';btn2.disabled=true;}
        if(CU)await sb.from('task_submissions').update({status:'expired',time_spent_seconds:t.spent}).eq('task_id',id).eq('user_id',CU.id).eq('status','pending').exec();
      }
    }
    if(!any){clearInterval(masterTick);masterTick=null;}
  },1000);
}

/* ── TASK MODAL HELPERS ── */
function buildTaskStats(task,approvedCount,totalAttempted){
  var grid=document.getElementById('tm-stats-grid');
  if(!grid)return;
  var rat=task.reward||0;
  var approved=approvedCount||task.approved_count||0;
  var rejected=task.rejected_count||0;
  var attempted=totalAttempted||task.slots_used||0;
  var pct=attempted>0?((approved/attempted)*100).toFixed(0)+'%':'New';
  var rows=[
    ['Rate','$'+parseFloat(rat).toFixed(3)],
    ['Frequency',task.is_repeatable?'Every '+task.repeat_cooldown_hours+'h':'Once off'],
    ['AVG Completion',(task.avg_completion_minutes||2)+' mins'],
    ['Users Attempted',attempted||'New'],
    ['AVG Approval Time',(task.avg_approval_hours||12)+' hours'],
    ['Users Approved',approved+(attempted>0?' ('+pct+')':'')],
    ['Users Rejected',rejected||'0'],
    ['Min Time',task.min_time_seconds&&task.min_time_seconds>60?task.min_time_seconds+'s':'None']
  ];
  if(task.slots_total>0){var left=task.slots_total-(task.slots_used||0);rows.splice(3,0,['Slots Left',left+'/'+task.slots_total]);}
  grid.innerHTML=rows.map(function(r){
    return '<div style="color:var(--mu);font-weight:600">'+r[0]+':</div><div style="color:var(--tx);font-weight:700">'+r[1]+'</div>';
  }).join('');
}

/* ── PROOF VALIDATION RULES ────────────────────────────────────
   confirm / visit : auto-confirm, no user input required
   code            : text required (≥ 4 chars), no screenshot
   screenshot      : BOTH text (≥ 10 chars) AND screenshot required
   default         : text required (≥ 10 chars)
────────────────────────────────────────────────────────────── */
var PROOF_RULES = {
  confirm:    {needText:false, needShot:false, minText:0,  textLabel:'',                 textPH:''},
  visit:      {needText:false, needShot:false, minText:0,  textLabel:'',                 textPH:''},
  code:       {needText:true,  needShot:false, minText:4,  textLabel:'Completion Code',  textPH:'Paste the code you received from the advertiser…'},
  screenshot: {needText:true,  needShot:true,  minText:10, textLabel:'Proof Description',textPH:'Describe what you did — include your username, profile link, or any relevant details (min 10 characters)…'}
};

function showProofErr(msg){
  var el=document.getElementById('tm-proof-err');
  if(!el)return;
  el.textContent=msg||'';
  el.style.display=msg?'block':'none';
  if(msg)el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function acceptTask(tid,proofType,lim,minTime){
  if(!CU)return;
  var tMinTime=minTime||60;
  if(activeTasks[tid]&&activeTasks[tid].done)return;

  /* ── start time tracking ── */
  if(!activeTasks[tid]){
    activeTasks[tid]={spent:0,limit:lim||7200,done:false};
    var ex=await sb.from('task_submissions').select('id,time_spent_seconds,status').eq('task_id',tid).eq('user_id',CU.id).order('started_at',{ascending:false}).limit(1).single();
    if(!ex.data||ex.data.status==='approved'||ex.data.status==='rejected'||ex.data.status==='expired'||ex.data.status==='cancelled'){
      await sb.from('task_submissions').insert({task_id:tid,user_id:CU.id,status:'pending',started_at:new Date().toISOString()});
    }else if(ex.data){activeTasks[tid].spent=ex.data.time_spent_seconds||0;}
    var card=document.getElementById('tc-'+tid);if(card)card.classList.add('t-active');
    startMaster();

  ssUrl=null; curProofType=proofType; window._curTaskId=tid; _taskMinTime=tMinTime;

  var rules=PROOF_RULES[proofType]||PROOF_RULES.screenshot;

  /* ── header ── */
  var e=function(id){return document.getElementById(id);};

    var chips='<div style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px;background:#E8F5E9;border-radius:20px;font-size:11px;font-weight:700;color:#2E7D32">&#10003; '+(taskObj.approved_count||0)+' approved</div>';

    if(taskObj.min_time_seconds>60)chips+='<div style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px;background:#F3E5F5;border-radius:20px;font-size:11px;font-weight:700;color:#6B46C1">&#9203; min '+taskObj.min_time_seconds+'s</div>';

      '<textarea class="mta" id="m-proof" placeholder="'+rules.textPH+'" style="min-height:90px;resize:none;margin-bottom:14px" oninput="showProofErr(\'\')"></textarea>'+

      '<label style="font-size:11px;font-weight:800;color:var(--tx);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Screenshot <span style="color:var(--red)">*</span></label>'+
      '<div id="drop-zone" onclick="document.getElementById(\'m-file\').click()" '+
        'ondragover="event.preventDefault();this.style.borderColor=\'var(--blue)\';this.style.background=\'#E3F2FD\'" '+
        'ondragleave="this.style.borderColor=\'var(--b2)\';this.style.background=\'var(--bg2)\'" '+
        'ondrop="handleDrop(event)" '+
        'style="border:2.5px dashed var(--b2);border-radius:12px;padding:22px 16px;text-align:center;cursor:pointer;background:var(--bg2);transition:all .2s">'+
        '<div style="font-size:30px;margin-bottom:6px">&#128247;</div>'+
        '<div style="font-size:13px;font-weight:700;color:var(--tx)">Tap to upload screenshot</div>'+
        '<div style="font-size:11px;color:var(--mu);margin-top:3px">or drag &amp; drop &bull; JPG PNG GIF WEBP</div>'+
        '<input type="file" id="m-file" style="display:none" accept="image/jpeg,image/png,image/gif,image/webp" onchange="handleUpload(this)"/>'+
      '</div>'+

      '<div id="up-progress" style="display:none;margin-top:10px">'+
        '<div style="height:4px;background:var(--b);border-radius:2px;overflow:hidden">'+
          '<div id="up-bar" style="height:100%;background:var(--blue);width:0%;transition:width .3s"></div>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--blue);font-weight:600;margin-top:4px">Uploading…</div>'+
      '</div>'+

      '<div id="up-done" style="display:none;margin-top:10px;padding:10px 12px;background:#E8F5E9;border:1.5px solid #A5D6A7;border-radius:10px">'+

          '<span style="font-size:20px;color:#2E7D32">&#10003;</span>'+
          '<div style="flex:1"><div style="font-size:12px;font-weight:700;color:#2E7D32">Screenshot uploaded</div>'+
          '<div style="font-size:10px;color:var(--mu)" id="up-fname"></div></div>'+
          '<button onclick="removeUpload()" style="background:none;border:1px solid #A5D6A7;border-radius:6px;font-size:12px;color:#C62828;cursor:pointer;padding:2px 8px">&#215; Remove</button>'+

      '<textarea class="mta" id="m-proof" placeholder="Describe how you completed the task in detail…" style="min-height:90px;resize:none" oninput="showProofErr(\'\')"></textarea>'+

function syncModalDual(tid){
  var t=tid?activeTasks[tid]:null;if(!t)return;
  var rem=Math.max(0,t.limit-t.spent);
  var re=document.getElementById('tm-rem');if(re){re.textContent=fmtSec(rem);re.style.color=rem<600?'#C62828':'#fff';}
  var se=document.getElementById('tm-spt');if(se)se.textContent=fmtSec(t.spent);
  if(_taskMinTime>60&&t.spent>=_taskMinTime){
    var sb2=document.getElementById('tm-submit');
    if(sb2&&sb2.disabled){sb2.disabled=false;sb2.style.opacity='1';}
    var mm=document.getElementById('min-time-msg');
    if(mm){mm.textContent='Minimum time reached — you may now submit.';mm.style.color='var(--green)';mm.style.background='var(--gl)';mm.style.borderColor='var(--gb)';}
  }
}

function startModalCountdown(secs){
  var subBtn=document.getElementById('tm-submit');
  if(subBtn&&_taskMinTime<=60){subBtn.disabled=true;subBtn.style.opacity='0.45';}
  modalCountdownSecs=secs;
  if(modalCountdownTimer)clearInterval(modalCountdownTimer);
  modalCountdownTimer=setInterval(function(){
    modalCountdownSecs--;
    var el=document.getElementById('m-countdown');if(el)el.textContent=Math.max(0,modalCountdownSecs);
    if(modalCountdownSecs<=0){
      clearInterval(modalCountdownTimer);modalCountdownTimer=null;
      if(_taskMinTime<=60){var s=document.getElementById('tm-submit');if(s){s.disabled=false;s.style.opacity='1';}}
    }
  },1000);
}

async function handleUpload(input){
  if(!input.files[0]||!CU)return;
  var f=input.files[0];
  /* validate file type */
  var allowed=['image/jpeg','image/png','image/gif','image/webp'];
  if(allowed.indexOf(f.type)<0){showProofErr('Invalid file type. Please upload a JPG, PNG, GIF, or WEBP image.');return;}
  /* validate size ≤ 10 MB */
  if(f.size>10*1024*1024){showProofErr('File too large. Maximum size is 10 MB.');return;}
  showProofErr('');
  _startUploadUI(f.name);
  var path='proofs/'+CU.id+'_'+Date.now()+'_'+f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  var res=await sb.storage.from('screenshots').upload(path,f,{upsert:true});
  if(res.error){
    _resetUploadUI();
    showProofErr('Upload failed: '+res.error.message);
    return;
  }
  ssUrl=STOR+path;
  _finishUploadUI(f.name);
}

function handleDrop(e){
  e.preventDefault();
  var dz=document.getElementById('drop-zone');
  if(dz){dz.style.borderColor='var(--b2)';dz.style.background='var(--bg2)';}
  var file=e.dataTransfer.files[0];
  if(!file)return;
  var fake={files:[file]};
  handleUpload(fake);
}

function _startUploadUI(fname){
  var dz=document.getElementById('drop-zone');if(dz)dz.style.display='none';
  var prog=document.getElementById('up-progress');if(prog)prog.style.display='block';
  var bar=document.getElementById('up-bar');
  /* animate bar */
  if(bar){bar.style.width='0%';setTimeout(function(){bar.style.width='80%';},50);}
}

function _finishUploadUI(fname){
  var prog=document.getElementById('up-progress');if(prog)prog.style.display='none';
  var done=document.getElementById('up-done');if(done)done.style.display='block';
  var fnEl=document.getElementById('up-fname');if(fnEl)fnEl.textContent=fname;
  var prev=document.getElementById('m-prev');if(prev&&ssUrl){prev.src=ssUrl;prev.style.display='block';}
  showProofErr('');
}

function _resetUploadUI(){
  var dz=document.getElementById('drop-zone');if(dz)dz.style.display='';
  var prog=document.getElementById('up-progress');if(prog)prog.style.display='none';
}

function removeUpload(){
  ssUrl=null;
  var done=document.getElementById('up-done');if(done)done.style.display='none';
  var prev=document.getElementById('m-prev');if(prev){prev.src='';prev.style.display='none';}
  var dz=document.getElementById('drop-zone');if(dz)dz.style.display='';
  var fi=document.getElementById('m-file');if(fi)fi.value='';
  showProofErr('');
}

async function submitTask(){
  if(!CU)return;
  var tid=window._curTaskId||null;
  if(!tid){for(var id in activeTasks){if(!activeTasks[id].done){tid=id;break;}}}
  if(!tid)return;

  var proofType=curProofType||'screenshot';
  var rules=PROOF_RULES[proofType]||PROOF_RULES.screenshot;
  var proofEl=document.getElementById('m-proof');
  var proofText=(proofEl?proofEl.value:'').trim();

  /* ── STRICT VALIDATION ── */
  if(rules.needText){
    if(!proofText){
      showProofErr('This field is required. Please '+(proofType==='code'?'paste your completion code.':'describe how you completed the task.'));
      if(proofEl)proofEl.focus();
      return;
    }
    if(proofText.length<rules.minText){
      showProofErr('Too short — please write at least '+rules.minText+' characters. ('+(proofText.length)+' / '+rules.minText+')');
      if(proofEl)proofEl.focus();
      return;
    }
    /* reject placeholder-like text */
    var placeholderPhrases=['your username','text proof','describe how','completion code','paste the code','paste your','please enter','click here','example','n/a','na','none','test','abc','123'];
    var lower=proofText.toLowerCase();
    for(var pi=0;pi<placeholderPhrases.length;pi++){
      if(lower===placeholderPhrases[pi]||lower.length<=12&&lower.indexOf(placeholderPhrases[pi])>=0){
        showProofErr('Please provide real proof — placeholder text is not accepted.');
        if(proofEl)proofEl.focus();
        return;
      }
    }
  }

  if(rules.needShot&&!ssUrl){
    showProofErr('A screenshot is required for this task. Please upload a screenshot before submitting.');
    var dz=document.getElementById('drop-zone');if(dz){dz.style.borderColor='var(--red)';dz.style.background='#FFEBEE';dz.scrollIntoView({behavior:'smooth',block:'nearest'});}
    return;
  }

  /* ── save to DB ── */
  var subBtn=document.getElementById('tm-submit');
  if(subBtn){subBtn.disabled=true;subBtn.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" style="width:14px;height:14px"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg> Submitting…';subBtn.style.opacity='0.7';}

  var t=activeTasks[tid];
  var payload={
    status:'pending',
    proof_data:proofText||(proofType==='confirm'?'push-confirmed':proofType==='visit'?'page-visited':'submitted'),
    submitted_at:new Date().toISOString(),
    time_spent_seconds:t?t.spent:0
  };
  if(ssUrl)payload.screenshot_url=ssUrl;

  await sb.from('task_submissions').update(payload).eq('task_id',tid).eq('user_id',CU.id).eq('status','pending').exec();

  var taskObj=allTasks.filter(function(tt){return tt.id===tid;})[0]||{};
  var isRep=taskObj.is_repeatable||false;

  if(isRep){
    var btn2=document.getElementById('btn-'+tid);if(btn2){btn2.textContent='Pending';btn2.className='tbtn tbtn-pending';btn2.disabled=true;}
  }else{
    var card2=document.getElementById('tc-'+tid);
    if(card2){card2.style.transition='opacity .4s,transform .4s';card2.style.opacity='0';card2.style.transform='translateY(-8px)';setTimeout(function(){if(card2.parentNode)card2.remove();},400);}
  }
  try{var ns=(taskObj.slots_used||0)+1;await sb.from('tasks').update({slots_used:ns}).eq('id',tid).exec();taskObj.slots_used=ns;}catch(ex){}
  if(t)t.done=true;
  closeTaskModal();
  setTimeout(function(){if(!isRep)goTab('mytasks');else loadMyTasks();},isRep?0:550);
}

async function saveConnectedAccount() {
  if(!CU || !_connMethod) return;
  var val = document.getElementById('conn-input').value.trim();
  var msgEl = document.getElementById('conn-msg');
  if(!val) { msgEl.innerHTML = '<span style="color:var(--red)">Please enter your account details.</span>'; return; }

  if(_connMethod === 'paypal' || _connMethod === 'payoneer') {
    if(!/\S+@\S+\.\S+/.test(val)) { msgEl.innerHTML = '<span style="color:var(--red)">Please enter a valid email address.</span>'; return; }
  }
  if(_connMethod === 'mpesa') {
    if(!/^\+?\d{9,15}$/.test(val.replace(/\s/g,''))) { msgEl.innerHTML = '<span style="color:var(--red)">Please enter a valid phone number.</span>'; return; }
    val = val.replace(/\s/g,'');

  msgEl.innerHTML = '<span style="color:var(--blue)">Saving...</span>';
  var existing = _userPayAccounts[_connMethod];

  if(existing && existing.id) {

async function sendOTP(email,userId,purpose){
  var res=await fetch(SU+'/functions/v1/send-otp',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK},
    body:JSON.stringify({email:email,user_id:userId,purpose:purpose||'verify'})
  });
  var data=await res.json();
  if(!res.ok)return{error:data.error||'Failed to send OTP'};
  return{success:true};
}

async function verifyOTP(email,otp,purpose){
  var now=new Date().toISOString();
  var res=await sb.from('email_otps').select('*')
    .eq('email',email).eq('otp',otp).eq('purpose',purpose||'verify')
    .eq('used',false).gt('expires_at',now).order('created_at',{ascending:false}).limit(1).single();
  if(!res.data)return{error:'Invalid or expired code. Please try again.'};
  // increment attempts check
  if((res.data.attempts||0)>=5){await sb.from('email_otps').update({used:true}).eq('id',res.data.id).exec();return{error:'Too many attempts. Please request a new code.'};}
  await sb.from('email_otps').update({used:true}).eq('id',res.data.id).exec();
  return{success:true,record:res.data};
}

var _otpCtx={purpose:null,email:null,userId:null,onSuccess:null};
var _otpResendTimer=null;

function openOTPModal(purpose,email,userId,onSuccess){
  _otpCtx={purpose:purpose,email:email,userId:userId,onSuccess:onSuccess};
  var modal=document.getElementById('otp-modal');

  if(msgEl)msgEl.innerHTML='';
  var inputs=document.querySelectorAll('.otp-digit');
  inputs.forEach(function(inp){inp.value='';});
  modal.classList.add('open');
  sendOTPAndStart(email,userId,purpose);
}

async function sendOTPAndStart(email,userId,purpose){
  var subEl=document.getElementById('otp-modal-sub');
  var msgEl=document.getElementById('otp-modal-msg');
  var res=await sendOTP(email,userId,purpose);
  if(res.error){
    if(subEl)subEl.textContent='Failed to send code.';
    if(msgEl)msgEl.innerHTML='<span style="color:var(--red)">'+res.error+'</span>';
    return;
  }
  if(subEl)subEl.textContent='Code sent to '+email+'. Check your inbox (and spam).';
  startOTPResendTimer();
  // Focus first digit
  setTimeout(function(){var f=document.getElementById('otp-d1');if(f)f.focus();},200);
}

function startOTPResendTimer(){
  if(_otpResendTimer)clearInterval(_otpResendTimer);
  var secs=60;
  var btn=document.getElementById('otp-resend-btn');
  if(btn){btn.disabled=true;btn.textContent='Resend in 60s';}
  _otpResendTimer=setInterval(function(){
    secs--;
    if(btn)btn.textContent='Resend in '+secs+'s';
    if(secs<=0){
      clearInterval(_otpResendTimer);_otpResendTimer=null;
      if(btn){btn.disabled=false;btn.textContent='Resend code';}
    }
  },1000);
}

function otpKeyUp(inp,nextId,prevId){
  var val=inp.value.replace(/\D/g,'').slice(0,1);
  inp.value=val;
  if(val&&nextId){var n=document.getElementById(nextId);if(n)n.focus();}
  if(!val&&prevId){
    // on backspace, go to previous
  }
  // Auto-submit if all 6 filled
  var digits=['otp-d1','otp-d2','otp-d3','otp-d4','otp-d5','otp-d6'];
  var code=digits.map(function(id){var e=document.getElementById(id);return e?e.value:'';}).join('');
  if(code.length===6)submitOTPCode();
}

function otpKeyDown(inp,prevId){
  if(event.key==='Backspace'&&!inp.value&&prevId){
    var p=document.getElementById(prevId);if(p){p.value='';p.focus();}
  }
}

function otpPaste(e){
  e.preventDefault();
  var txt=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
  var digits=['otp-d1','otp-d2','otp-d3','otp-d4','otp-d5','otp-d6'];
  digits.forEach(function(id,i){var el=document.getElementById(id);if(el)el.value=txt[i]||'';});
  if(txt.length===6)setTimeout(submitOTPCode,100);
}

async function submitOTPCode(){
  var digits=['otp-d1','otp-d2','otp-d3','otp-d4','otp-d5','otp-d6'];
  var code=digits.map(function(id){var e=document.getElementById(id);return e?e.value:'';}).join('');
  if(code.length<6)return;
  var msgEl=document.getElementById('otp-modal-msg');
  if(msgEl)msgEl.innerHTML='<span style="color:var(--blue)">Verifying...</span>';
  var res=await verifyOTP(_otpCtx.email,code,_otpCtx.purpose);
  if(res.error){
    if(msgEl)msgEl.innerHTML='<span style="color:var(--red)">'+res.error+'</span>';
    digits.forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});
    setTimeout(function(){var f=document.getElementById('otp-d1');if(f)f.focus();},100);
    return;
  }
  if(msgEl)msgEl.innerHTML='<span style="color:var(--green);font-weight:700">&#10003; Verified!</span>';
  setTimeout(async function(){
    closeModal('otp-modal');
    if(_otpCtx.onSuccess)await _otpCtx.onSuccess(res.record);
  },700);
}

async function resendOTP(){
  if(!_otpCtx.email)return;
  var btn=document.getElementById('otp-resend-btn');
  if(btn&&btn.disabled)return;
  var msgEl=document.getElementById('otp-modal-msg');
  if(msgEl)msgEl.innerHTML='<span style="color:var(--blue)">Sending new code...</span>';
  var res=await sendOTP(_otpCtx.email,_otpCtx.userId,_otpCtx.purpose);
  if(res.error){if(msgEl)msgEl.innerHTML='<span style="color:var(--red)">'+res.error+'</span>';return;}
  if(msgEl)msgEl.innerHTML='<span style="color:var(--green)">New code sent!</span>';
  startOTPResendTimer();
  setTimeout(function(){var f=document.getElementById('otp-d1');if(f)f.focus();},200);
}
