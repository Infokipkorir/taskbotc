<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{
  --blue:#1a56db;
  --gray:#6b7280;
  --bg:#f9fafb;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
}

.view{display:none;padding-bottom:90px}

/* PROFILE */
.profile-card{
  background:#fff;
  margin:16px;
  padding:20px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 4px 14px rgba(0,0,0,0.05);
}

.avatar{
  width:70px;height:70px;border-radius:50%;
  background:var(--blue);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;margin:0 auto 10px;
}

.name{font-weight:700;font-size:16px}
.username{font-size:13px;color:var(--gray)}
.email{font-size:12px;color:var(--gray)}

.badge{
  display:inline-block;
  margin-top:6px;
  font-size:12px;
  background:#eef2ff;
  color:var(--blue);
  padding:4px 8px;
  border-radius:20px;
}

/* STATS GRID */
.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px;
}

.stat{
  background:#f3f4f6;
  padding:10px;
  border-radius:10px;
}

.stat-num{font-weight:700;color:var(--blue)}
.stat-label{font-size:11px;color:var(--gray)}

/* MENU */
.menu{margin:16px}

.menu-item{
  background:#fff;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.menu-left{
  display:flex;
  gap:10px;
  align-items:center;
}

.menu-left i{color:var(--blue)}

/* LOGOUT */
.logout{
  background:#ef4444;
  color:#fff;
  text-align:center;
  padding:14px;
  margin:16px;
  border-radius:12px;
  cursor:pointer;
}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
}

.nav-item{
  flex:1;
  text-align:center;
  padding:10px;
}

.nav-item i{font-size:20px;color:#6b7280}
.nav-label{font-size:10px;color:#6b7280}

.nav-item.active i,
.nav-item.active .nav-label{
  color:var(--blue);
}
</style>
</head>

<body>

<div class="view" id="view-profile">

<div class="profile-card">
  <div class="avatar" id="avatar">U</div>

  <div class="name" id="name">Loading...</div>
  <div id="verify-badge" style="font-size:12px;margin-top:5px;cursor:pointer"></div>
  <div class="username" id="username">@username</div>
  <div class="email" id="email">email</div>

  <div class="badge" id="country">🌍 Loading country</div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="tasks">0</div>
      <div class="stat-label">Tasks</div>
    </div>

    <div class="stat">
      <div class="stat-num" id="earnings">$0</div>
      <div class="stat-label">Earnings</div>
    </div>

    <div class="stat">
      <div class="stat-num" id="members">0</div>
      <div class="stat-label">Members</div>
    </div>

    <div class="stat">
      <div class="stat-num" id="since">—</div>
      <div class="stat-label">Joined</div>
    </div>
  </div>
</div>

<div class="logout" onclick="logout()">Sign Out</div>

</div>

  <div id="verify-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:999">

  <div style="background:#fff;padding:20px;border-radius:12px;width:90%;max-width:350px">

    <h3>Verify Account</h3>
    <p>Enter OTP sent to your email</p>

    <input id="otp-input" placeholder="Enter OTP"
      style="width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:6px">

    <button onclick="sendOTP()" style="width:100%;margin-bottom:10px">
      Send OTP
    </button>

    <button onclick="confirmOTP()" style="width:100%;background:#1a56db;color:#fff">
      Verify
    </button>

    <button onclick="closeVerifyModal()" style="margin-top:10px;width:100%">
      Cancel
    </button>

  </div>
  </div>

  <div class="card">
  <b>Payment Method</b>

  <div class="item">
    <span><i class="bi bi-paypal"></i> PayPal Email</span>
    <span id="paypal-email">Loading...</span>
  </div>

  <div class="item">
    <span>Status</span>
    <span id="paypal-status" style="color:green">Active</span>
  </div>
  </div>
  <div class="card">
  <b>Recent Activity</b>
  <div id="activity-list">Loading...</div>
  </div>
<!-- NAV -->
<nav class="bottom-nav">

  <div class="nav-item" onclick="location.href='task.html'">
    <i class="bi bi-list-check"></i>
    <div class="nav-label">Tasks</div>
  </div>

  <div class="nav-item" onclick="location.href='mytasks.html'">
    <i class="bi bi-clipboard-check"></i>
    <div class="nav-label">My Tasks</div>
  </div>

  <div class="nav-item" onclick="location.href='support.html'">
    <i class="bi bi-chat-dots"></i>
    <div class="nav-label">Support</div>
  </div>

  <div class="nav-item" onclick="location.href='referrals.html'">
    <i class="bi bi-people"></i>
    <div class="nav-label">Referrals</div>
  </div>

  <div class="nav-item active">
    <i class="bi bi-person"></i>
    <div class="nav-label">Profile</div>
  </div>

</nav>

<script>
const db = supabase.createClient(
 "https://lwnbfjjsstxkyexeojcl.supabase.co",
 "sb_publishable_Pj9ocGkssu5Gh6qZXFnZQQ_LdghnZt9"
);

let currentUser = null;

/* FLAG HELPER */
function getFlag(country){
  const flags = {
    Kenya:"🇰🇪",
    Nigeria:"🇳🇬",
    USA:"🇺🇸",
    UK:"🇬🇧"
  };
  return flags[country] || "🌍";
}

  <script>

const db = supabase.createClient(
  "https://lwnbfjjsstxkyexeojcl.supabase.co",
  "sb_publishable_Pj9ocGkssu5Gh6qZXFnZQQ_LdghnZt9"
);

let currentUser = null;

/* ═════════ LOAD PROFILE ═════════ */
document.addEventListener("DOMContentLoaded", async () => {

  const { data } = await db.auth.getUser();
  if (!data.user) return location.href = "index.html";

  currentUser = data.user;

  // BASIC INFO
  document.getElementById("username").textContent =
    currentUser.user_metadata?.full_name || "User";

  document.getElementById("avatar").textContent =
    currentUser.email[0].toUpperCase();

  const date = new Date(currentUser.created_at);
  document.getElementById("since").textContent = date.getFullYear();

  document.getElementById("payment-method").textContent =
    "PayPal - " + currentUser.email;

  // VERIFICATION
  checkVerification();

  // LOAD DATA
  loadTransactions();
});

/* ═════════ VERIFICATION STATUS ═════════ */
function checkVerification() {
  const badge = document.getElementById("verify-badge");

  if (currentUser.user_metadata?.verified) {
    badge.innerHTML = "✔ Verified";
    badge.style.color = "green";
  } else {
    badge.innerHTML = "⚠ Not Verified";
    badge.style.color = "red";
    badge.onclick = openVerifyModal;
  }
}

/* ═════════ LOAD TRANSACTIONS ═════════ */
async function loadTransactions() {

  const { data, error } = await db
    .from("transactions")
    .select("*")
    .eq("user_id", currentUser.id)
    .order("created_at", { ascending: false });

  const box = document.getElementById("transactions");

  if (error || !data.length) {
    box.innerHTML = `<div class="item">No transactions yet</div>`;
    return;
  }

  // calculate earnings
  let total = 0;

  box.innerHTML = data.map(tx => {

    if (tx.status === "completed") total += Number(tx.amount);

    return `
      <div class="item">
        <span>${tx.type}</span>
        <span style="color:${tx.amount > 0 ? 'green':'red'}">
          ${tx.amount > 0 ? '+' : ''}$${tx.amount}
        </span>
      </div>
    `;
  }).join("");

  document.getElementById("earnings").textContent =
    "$" + total.toFixed(2);
}

/* ═════════ VERIFY MODAL ═════════ */
function openVerifyModal() {
  document.getElementById("verify-modal").style.display = "flex";
}

function closeVerifyModal() {
  document.getElementById("verify-modal").style.display = "none";
}

/* ═════════ SEND OTP (SIMULATED) ═════════ */
async function sendOTP() {
  alert("OTP sent to your email");

  // In production use Supabase email OTP
}

/* ═════════ CONFIRM OTP ═════════ */
async function confirmOTP() {

  const otp = document.getElementById("otp-input").value;

  if (otp.length < 4) {
    alert("Invalid OTP");
    return;
  }

  // Simulate success → mark verified
  const { error } = await db.auth.updateUser({
    data: { verified: true }
  });

  if (error) {
    alert(error.message);
    return;
  }

  alert("Account verified successfully!");
  closeVerifyModal();
  checkVerification();
}


/* LOAD PROFILE */
async function loadProfile(){

  const {data} = await db.auth.getUser();

  if(!data.user){
    location.href="index.html";
    return;
  }

  currentUser = data.user;

  const meta = data.user.user_metadata;

  document.getElementById("name").textContent = meta.full_name || "User";
  document.getElementById("username").textContent = "@"+(meta.username || "user");
  document.getElementById("email").textContent = data.user.email;

  document.getElementById("avatar").textContent =
    (meta.full_name || data.user.email)[0].toUpperCase();

  document.getElementById("country").textContent =
    getFlag(meta.country) + " " + (meta.country || "Unknown");

  document.getElementById("since").textContent =
    new Date(data.user.created_at).toLocaleDateString();

  loadStats();
}

/* LOAD STATS */
async function loadStats(){

  const {data} = await db
    .from("user_tasks")
    .select("*")
    .eq("user_id", currentUser.id);

  if(data){
    document.getElementById("tasks").textContent = data.length;

    let total = data.reduce((s,t)=> s + (t.reward||0),0);
    document.getElementById("earnings").textContent = "$"+total;
  }

  // MEMBERS COUNT
  const {count} = await db
    .from("profiles")
    .select("*", { count:"exact", head:true });

  document.getElementById("members").textContent = count || 0;
}
  /* ═════════ PAYPAL + ACTIVITY ═════════ */

async function loadPaymentAndActivity() {

  // PAYPAL
  document.getElementById("paypal-email").textContent =
    currentUser.email;

  // ACTIVITY
  const { data } = await db
    .from("activities")
    .select("*")
    .eq("user_id", currentUser.id)
    .order("created_at", { ascending: false })
    .limit(10);

  const box = document.getElementById("activity-list");

  if (!data || !data.length) {
    box.innerHTML = "<div>No recent activity</div>";
    return;
  }

  box.innerHTML = data.map(a => `
    <div class="item">
      <span>${a.title}</span>
      <span style="font-size:11px;color:#999">
        ${new Date(a.created_at).toLocaleDateString()}
      </span>
    </div>
  `).join("");
}

/* LOGOUT */
async function logout(){
  await db.auth.signOut();
  location.href="index.html";
}

document.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById("view-profile").style.display="block";
  loadProfile();
});
</script>

</body>
    </html>
