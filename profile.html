<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<rect width='100' height='100' rx='20' fill='%231a56db'/>
<text x='50' y='60' font-size='40' text-anchor='middle' fill='white'>OT</text>
</svg>">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{--blue:#1a56db;--gray:#6b7280;--bg:#f9fafb;--card:#fff}
body{margin:0;font-family:system-ui;background:var(--bg)}
.view{display:none;padding-bottom:90px}

/* PROFILE */
.profile-card{background:#fff;margin:16px;padding:20px;border-radius:16px;text-align:center}
.avatar{width:70px;height:70px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;margin:auto}
.name{font-weight:700}
.username,.email{font-size:13px;color:var(--gray)}
.badge{margin-top:6px;font-size:12px;background:#eef2ff;color:var(--blue);padding:4px 8px;border-radius:20px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
.stat{background:#f3f4f6;padding:10px;border-radius:10px;text-align:center}

/* BUTTON */
.center{text-align:center}
.btn{margin-top:12px;padding:10px 20px;border:none;border-radius:10px;background:var(--blue);color:#fff;cursor:pointer}

/* MODAL */
#edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
.modal-box{background:#fff;width:90%;max-width:360px;padding:20px;border-radius:14px}
input,select{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
/* EDIT MODAL */
  #edit-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  align-items:center;
  justify-content:center;
  z-index:99999;
  }
/* CARD */
.card{background:#fff;margin:16px;padding:15px;border-radius:12px}
.item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}

/* NAV */
.bottom-nav{position:fixed;bottom:0;width:100%;background:#fff;border-top:1px solid #eee;display:flex}
.nav-item{flex:1;text-align:center;padding:10px}
.nav-item i{font-size:20px;color:var(--gray)}
.nav-item.active i{color:var(--blue)
}
  .logout-btn{
  display:block;
  width:calc(100% - 32px);
  margin:16px auto;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#ef4444;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.logout-btn:hover{
  background:#dc2626;
}

.logout-btn:active{
  transform:scale(0.97);
}
  
</style>
</head>

<body>

<div class="view" id="view-profile">

  <div class="profile-card">
    <div class="avatar" id="avatar">U</div>

    <div class="name" id="name">Loading...</div>
    <div id="verify-badge"></div>

    <div class="username" id="username"></div>
    <div class="email" id="email"></div>

    <div class="badge" id="country">🌍</div>

    <div class="stats">
      <div class="stat"><b id="tasks">0</b><br>Tasks</div>
      <div class="stat"><b id="earnings">$0</b><br>Earnings</div>
      <div class="stat"><b id="members">0</b><br>Members</div>
      <div class="stat"><b id="since">—</b><br>Joined</div>
    </div>
  </div>

</div>

<!-- EDIT BUTTON (CENTERED) -->
<div style="text-align:center;margin-top:15px;">
  <button onclick="openEditModal()"
  style="padding:10px 16px;background:#1a56db;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:600;">
  Edit Profile
  </button>
</div>

<!-- MODAL OVERLAY -->
<div id="edit-modal"
     style="display:none;position:fixed;inset:0;
     background:rgba(0,0,0,0.5);
     align-items:center;
     justify-content:center;
     z-index:999;">

  <!-- MODAL CARD -->
  <div class="modal-box"
       style="background:#fff;width:92%;max-width:420px;
       padding:20px;border-radius:14px;
       max-height:90vh;overflow:auto;
       box-shadow:0 10px 30px rgba(0,0,0,0.2);">

    <h3 style="margin-bottom:10px;">Edit Profile</h3>

    <input id="edit-name" placeholder="Full name">
    <input id="edit-username" placeholder="Username">

    <select id="edit-country"></select>
    <small id="country-lock-msg" style="color:red;display:none;">
      Country cannot be changed after first save
    </small>

    <input id="edit-dob" type="date">

    <select id="edit-gender">
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Transgender</option>
    </select>

    <input id="edit-phone" placeholder="Phone Number">
    <input id="edit-address" placeholder="Address">

    <h4 style="margin-top:10px;">Payment Settings</h4>
    <input id="edit-paypal" placeholder="PayPal Email">

    <h4 style="margin-top:10px;">Security</h4>

    <button onclick="resetPassword()" class="btn"
      style="width:100%;background:#f59e0b;color:#fff;margin-bottom:6px;">
      Reset Password
    </button>

    <button onclick="deactivateAccount()" class="btn"
      style="width:100%;background:#ef4444;color:#fff;">
      Deactivate Account
    </button>

    <button onclick="saveProfile()" class="btn"
      style="width:100%;margin-top:10px;">
      Save Changes
    </button>

    <button onclick="closeEditModal()" class="btn"
      style="width:100%;background:#eee;color:#000;margin-top:6px;">
      Cancel
    </button>

  </div>
</div>
<!-- PAYMENT -->
<div class="card">
  <b>Payment</b>
  <div class="item">
    <span><i class="bi bi-paypal"></i> PayPal</span>
    <span id="paypal-email"></span>
  </div>
</div>

<!-- ACTIVITY -->
<div class="card">
  <b>Activity</b>
  <div id="activity-list"></div>
</div>

<button class="logout-btn" onclick="logout()">
  <i class="bi bi-box-arrow-right"></i> Sign Out
</button>
</div>
<script>
  const db = supabase.createClient(
  "https://lwnbfjjsstxkyexeojcl.supabase.co",
  "sb_publishable_Pj9ocGkssu5Gh6qZXFnZQQ_LdghnZt9"
);

let currentUser;

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", async () => {
  document.getElementById("view-profile").style.display = "block";

  const { data } = await db.auth.getUser();

  if (!data.user) {
    location.href = "index.html";
    return;
  }

  currentUser = data.user;

  await loadProfile();
  await loadStats();
  await loadActivity();
});

/* =========================
   SAFE SET
========================= */
function setText(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value;
}

/* =========================
   PROFILE LOAD (FIXED)
========================= */
async function loadProfile() {
  try {
    const { data, error } = await db
      .from("profiles")
      .select("*")
      .eq("id", currentUser.id)
      .maybeSingle();

    console.log("PROFILE DATA:", data, error);

    if (!data) {
      setText("name", "User");
      setText("username", "@user");
      setText("email", currentUser.email);
      setText("avatar", "U");
      setText("country", "🌍 Unknown");
      setText("since", new Date(currentUser.created_at).getFullYear());
      return;
    }

    setText("name", data.full_name || "User");
    setText("username", "@" + (data.username || "user"));
    setText("email", currentUser.email);

    setText("avatar", (data.full_name?.[0] || "U").toUpperCase());

    // COUNTRY (ONLY ONE FIELD USED)
    setText(
      "country",
      getFlag(data.country) + " " + (data.country || "Unknown")
    );

    setText("since", new Date(currentUser.created_at).getFullYear());

    setText("paypal-email", data.paypal_email || "Not set");

  } catch (err) {
    console.error("PROFILE ERROR:", err);
  }
}

/* =========================
   STATS
========================= */
async function loadStats() {
  const { data } = await db
    .from("user_tasks")
    .select("*")
    .eq("user_id", currentUser.id);

  setText("tasks", data?.length || 0);
}

/* =========================
   ACTIVITY
========================= */
async function loadActivity() {
  const { data } = await db
    .from("activities")
    .select("*")
    .eq("user_id", currentUser.id)
    .limit(5);

  const box = document.getElementById("activity-list");

  if (!data?.length) {
    box.innerHTML = "No activity";
    return;
  }

  box.innerHTML = data
    .map((a) => `<div class="item"><span>${a.title}</span></div>`)
    .join("");
}

/* =========================
   EDIT MODAL
========================= */
  async function openEditModal(){
  document.getElementById("edit-modal").style.display = "flex";
}

function closeEditModal(){
  document.getElementById("edit-modal").style.display = "none";
}

  const modal = document.getElementById("edit-modal");
  modal.style.display = "flex"; // ONLY METHOD USED

  if(!currentUser?.id){
    console.error("No user");
    return;
  }

  const { data } = await db
    .from("profiles")
    .select("*")
    .eq("id", currentUser.id)
    .maybeSingle();

  if(!data) return;

  document.getElementById("edit-name").value = data.full_name || "";
  document.getElementById("edit-username").value = data.username || "";
  document.getElementById("edit-paypal").value = data.paypal_email || "";

  loadCountries(data.country);
  }

/* =========================
   COUNTRIES
========================= */
function loadCountries(selected=""){

  const countries = [
    {code:"KE",name:"Kenya"},
    {code:"NG",name:"Nigeria"},
    {code:"US",name:"United States"},
    {code:"GB",name:"United Kingdom"},
    {code:"IN",name:"India"},
    {code:"CA",name:"Canada"},
    {code:"DE",name:"Germany"},
    {code:"FR",name:"France"},
    {code:"ZA",name:"South Africa"},
    {code:"TZ",name:"Tanzania"},
    {code:"UG",name:"Uganda"},
    {code:"RW",name:"Rwanda"},
    {code:"ET",name:"Ethiopia"},
    {code:"BR",name:"Brazil"},
    {code:"CN",name:"China"},
    {code:"JP",name:"Japan"},
    {code:"RU",name:"Russia"},
    {code:"AU",name:"Australia"},
    {code:"IT",name:"Italy"},
    {code:"ES",name:"Spain"},
    {code:"MX",name:"Mexico"}
  ];

  const select = document.getElementById("edit-country");
  select.innerHTML = `<option value="">Select country</option>`;

  countries.forEach(c=>{
    const opt = document.createElement("option");
    opt.value = c.name;
    opt.textContent = `${getFlag(c.code)} ${c.name}`;

    if(c.name === selected) opt.selected = true;

    select.appendChild(opt);
  });
}

/* =========================
   SAVE PROFILE
========================= */
async function saveProfile() {
  const updates = {
    full_name: document.getElementById("edit-name").value,
    username: document.getElementById("edit-username").value,
    paypal_email: document.getElementById("edit-paypal").value,
    phone: document.getElementById("edit-phone").value,
    address: document.getElementById("edit-address").value,
    dob: document.getElementById("edit-dob").value,
    gender: document.getElementById("edit-gender").value
  };

  const country = document.getElementById("edit-country");

  if (!country.disabled) {
    updates.country = country.value;
  }

  const { error } = await db
    .from("profiles")
    .update(updates)
    .eq("id", currentUser.id);

  if (error) {
    alert(error.message);
    return;
  }

  alert("Profile updated!");
  closeEditModal();
  loadProfile();
}

/* =========================
   LOGOUT FIXED STYLE
========================= */
async function logout() {
  await db.auth.signOut();
  location.href = "index.html";
}

/* =========================
   FLAGS
========================= */
function getFlag(code) {
  const flags = {
    // Africa
    KE:"🇰🇪", NG:"🇳🇬", ZA:"🇿🇦", UG:"🇺🇬", TZ:"🇹🇿", RW:"🇷🇼", ET:"🇪🇹",
    GH:"🇬🇭", SN:"🇸🇳", SO:"🇸🇴", SD:"🇸🇩", EG:"🇪🇬", DZ:"🇩🇿", MA:"🇲🇦",
    TN:"🇹🇳", LY:"🇱🇾", CM:"🇨🇲", CI:"🇨🇮", CD:"🇨🇩", CG:"🇨🇬", AO:"🇦🇴",
    BW:"🇧🇼", ZM:"🇿🇲", ZW:"🇿🇼", MZ:"🇲🇿", MG:"🇲🇬", MW:"🇲🇼",

    // Europe
    GB:"🇬🇧", US:"🇺🇸", CA:"🇨🇦", AU:"🇦🇺", NZ:"🇳🇿",
    DE:"🇩🇪", FR:"🇫🇷", IT:"🇮🇹", ES:"🇪🇸", PT:"🇵🇹", NL:"🇳🇱",
    BE:"🇧🇪", CH:"🇨🇭", AT:"🇦🇹", SE:"🇸🇪", NO:"🇳🇴", DK:"🇩🇰",
    FI:"🇫🇮", PL:"🇵🇱", CZ:"🇨🇿", GR:"🇬🇷", IE:"🇮🇪", UA:"🇺🇦",
    RU:"🇷🇺",

    // Asia
    IN:"🇮🇳", CN:"🇨🇳", JP:"🇯🇵", KR:"🇰🇷", PK:"🇵🇰", BD:"🇧🇩",
    ID:"🇮🇩", MY:"🇲🇾", SG:"🇸🇬", TH:"🇹🇭", VN:"🇻🇳", PH:"🇵🇭",
    IR:"🇮🇷", IQ:"🇮🇶", SA:"🇸🇦", AE:"🇦🇪", TR:"🇹🇷", IL:"🇮🇱",
    AF:"🇦🇫", NP:"🇳🇵", LK:"🇱🇰",

    // Americas
    MX:"🇲🇽", BR:"🇧🇷", AR:"🇦🇷", CL:"🇨🇱", CO:"🇨🇴", PE:"🇵🇪",
    VE:"🇻🇪", UY:"🇺🇾", PY:"🇵🇾", BO:"🇧🇴",

    // Oceania
    FJ:"🇫🇯", PG:"🇵🇬", WS:"🇼🇸", TO:"🇹🇴"
  };

  return flags[String(code || "").toUpperCase()] || "🌍";
      }
</script>
</body>
</html>
