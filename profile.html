<style>
:root{--blue:#1a56db;--gray:#6b7280;--bg:#f9fafb;--card:#fff}
body{margin:0;font-family:system-ui;background:var(--bg)}
.view{display:none;padding-bottom:90px}

/* PROFILE */
.profile-card{background:#fff;margin:16px;padding:20px;border-radius:16px;text-align:center}
.avatar{width:70px;height:70px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;margin:auto}
.name{font-weight:700}
.username,.email{font-size:13px;color:var(--gray)}
.badge{margin-top:6px;font-size:12px;background:#eef2ff;color:var(--blue);padding:4px 8px;border-radius:20px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
.stat{background:#f3f4f6;padding:10px;border-radius:10px;text-align:center}

/* BUTTON */
.center{text-align:center}
.btn{margin-top:12px;padding:10px 20px;border:none;border-radius:10px;background:var(--blue);color:#fff;cursor:pointer}

/* MODAL */
#edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
.modal-box{background:#fff;width:90%;max-width:360px;padding:20px;border-radius:14px}
input,select{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px}

/* CARD */
.card{background:#fff;margin:16px;padding:15px;border-radius:12px}
.item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}

/* NAV */
.bottom-nav{position:fixed;bottom:0;width:100%;background:#fff;border-top:1px solid #eee;display:flex}
.nav-item{flex:1;text-align:center;padding:10px}
.nav-item i{font-size:20px;color:var(--gray)}
.nav-item.active i{color:var(--blue)
}
  .logout-btn{
  display:block;
  width:calc(100% - 32px);
  margin:16px auto;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#ef4444;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.logout-btn:hover{
  background:#dc2626;
}

.logout-btn:active{
  transform:scale(0.97);
}
  
</style>
</head>

<body>

<div class="view" id="view-profile">

  <div class="profile-card">
    <div class="avatar" id="avatar">U</div>

    <div class="name" id="name">Loading...</div>
    <div id="verify-badge"></div>

    <div class="username" id="username"></div>
    <div class="email" id="email"></div>

    <div class="badge" id="country">🌍</div>

    <div class="stats">
      <div class="stat"><b id="tasks">0</b><br>Tasks</div>
      <div class="stat"><b id="earnings">$0</b><br>Earnings</div>
      <div class="stat"><b id="members">0</b><br>Members</div>
      <div class="stat"><b id="since">—</b><br>Joined</div>
    </div>
  </div>

</div>

<!-- EDIT MODAL -->
<div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:999;">
  
  <div class="modal-box" style="background:#fff;width:92%;max-width:420px;padding:20px;border-radius:14px;max-height:90vh;overflow:auto;">

    <h3>Edit Profile</h3>

    <!-- BASIC INFO -->
    <input id="edit-name" placeholder="Full name">
    <input id="edit-username" placeholder="Username">

    <!-- COUNTRY (LOCK AFTER SAVE) -->
    <select id="edit-country"></select>
    <small id="country-lock-msg" style="color:red;display:none;">
      Country cannot be changed after first save
    </small>

    <!-- PERSONAL INFO -->
    <input id="edit-dob" type="date" placeholder="Date of Birth">

    <select id="edit-gender">
      <option value="">Select Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Transgender">Transgender</option>
    </select>

    <!-- CONTACT -->
    <input id="edit-phone" placeholder="Phone Number">
    <input id="edit-address" placeholder="Address">

    <!-- PAYMENT -->
    <h4 style="margin-top:10px;">Payment Settings</h4>
    <input id="edit-paypal" placeholder="PayPal Email">

    <!-- SECURITY -->
    <h4 style="margin-top:10px;">Security</h4>

    <button onclick="resetPassword()" class="btn" style="width:100%;background:#f59e0b;color:#fff;margin-bottom:6px;">
      Reset Password
    </button>

    <button onclick="deactivateAccount()" class="btn" style="width:100%;background:#ef4444;color:#fff;">
      Deactivate Account
    </button>

    <!-- ACTIONS -->
    <button class="btn" onclick="saveProfile()" style="width:100%;margin-top:10px;">
      Save Changes
    </button>

    <button class="btn" onclick="closeEditModal()" style="width:100%;background:#eee;color:#000;margin-top:6px;">
      Cancel
    </button>

  </div>
</div>

<!-- PAYMENT -->
<div class="card">
  <b>Payment</b>
  <div class="item">
    <span><i class="bi bi-paypal"></i> PayPal</span>
    <span id="paypal-email"></span>
  </div>
</div>

<!-- ACTIVITY -->
<div class="card">

  <div id="activity-list"></div>
</div>

<button class="logout-btn" onclick="logout()">
  <i class="bi bi-box-arrow-right"></i> Sign Out
</button>
</div>

/* INIT */

  /*Profile*/
async function loadProfile(){

  console.log("Loading profile for:", currentUser?.id);

  if(!currentUser?.id){
    console.error("No current user");
    return;
  }

  const { data, error } = await db
    .from("profiles")
    .select("*")
    .eq("id", currentUser.id)
    .single();

  console.log("PROFILE RESPONSE:", data, error);

  if(error || !data){
    console.warn("No profile found, using fallback");

    document.getElementById("name").textContent = "User";
    document.getElementById("username").textContent = "@user";
    document.getElementById("email").textContent = currentUser.email;

    document.getElementById("avatar").textContent =
      (currentUser.email?.[0] || "U").toUpperCase();

    document.getElementById("country").textContent = "🌍 Unknown";

    document.getElementById("tasks").textContent = "0";
    document.getElementById("earnings").textContent = "$0";
    document.getElementById("members").textContent = "0";

    document.getElementById("since").textContent =
      new Date(currentUser.created_at).getFullYear();

    return;
  }

  /* ✅ PROFILE DATA */

  document.getElementById("name").textContent =
    data.full_name || "User";

  document.getElementById("username").textContent =
    "@" + (data.username || "user");

  document.getElementById("email").textContent =
    currentUser.email;

  document.getElementById("avatar").textContent =
    (data.full_name?.[0] || "U").toUpperCase();

  document.getElementById("country").textContent =
    getFlag(data.country) + " " + (data.country || "Unknown");

  document.getElementById("tasks").textContent =
    data.tasks || 0;

  document.getElementById("earnings").textContent =
    "$" + (data.earnings || 0);

  document.getElementById("members").textContent =
    data.members || 0;

  document.getElementById("since").textContent =
    new Date(currentUser.created_at).getFullYear();
}
  
/* STATS */
async function loadStats(){
const {data}=await db.from("user_tasks").select("*").eq("user_id",currentUser.id);
document.getElementById("tasks").textContent=data?.length||0;
}

/* ACTIVITY */
async function loadActivity(){
const {data}=await db.from("activities")
.select("*").eq("user_id",currentUser.id).limit(5);

document.getElementById("activity-list").innerHTML=
data?.map(a=>`<div class="item"><span>${a.title}</span></div>`).join("")||"No activity";
}

/* EDIT */
async function openEditModal(){

  const modal = document.getElementById("edit-modal");
  modal.style.display = "flex";

  const { data } = await db
    .from("profiles")
    .select("*")
    .eq("id", currentUser.id)
    .single();

  if(!data) return;

  document.getElementById("edit-name").value = data.full_name || "";
  document.getElementById("edit-username").value = data.username || "";
  document.getElementById("edit-paypal").value = data.paypal_email || "";
  document.getElementById("edit-phone").value = data.phone || "";
  document.getElementById("edit-address").value = data.address || "";
  document.getElementById("edit-dob").value = data.dob || "";
  document.getElementById("edit-gender").value = data.gender || "";

  loadCountries(data.country);

  // LOCK COUNTRY AFTER FIRST SAVE
  if(data.country){
    document.getElementById("edit-country").disabled = true;
    document.getElementById("country-lock-msg").style.display = "block";
  }
}

function closeEditModal(){
document.getElementById("edit-modal").style.display="none";
}

/* SAVE */
async function saveProfile(){

  const updates = {
    full_name: document.getElementById("edit-name").value,
    username: document.getElementById("edit-username").value,
    paypal_email: document.getElementById("edit-paypal").value,
    phone: document.getElementById("edit-phone").value,
    address: document.getElementById("edit-address").value,
    dob: document.getElementById("edit-dob").value,
    gender: document.getElementById("edit-gender").value
  };

  // ONLY SET COUNTRY ONCE
  const countrySelect = document.getElementById("edit-country");

  if(!countrySelect.disabled){
    updates.country = countrySelect.value;
    updates.country_locked = true;
  }

  const { error } = await db
    .from("profiles")
    .update(updates)
    .eq("id", currentUser.id);

  if(error){
    alert(error.message);
    return;
  }

  alert("Profile updated!");
  closeEditModal();
  loadProfile();
}
/*Rest password*/
  async function resetPassword(){
  const { error } = await db.auth.resetPasswordForEmail(currentUser.email);

  if(error){
    alert(error.message);
    return;
  }

  alert("Password reset email sent!");
  }
  /*Delete account*/
  async function deactivateAccount(){

  if(!confirm("Are you sure you want to deactivate your account?")) return;

  const { error } = await db
    .from("profiles")
    .update({ status: "inactive" })
    .eq("id", currentUser.id);

  if(error){
    alert(error.message);
    return;
  }

  await db.auth.signOut();
  location.href = "index.html";
  }
/* LOGOUT */

location.href="index.html";
