<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<rect width='100' height='100' rx='20' fill='%231a56db'/>
<text x='50' y='60' font-size='40' text-anchor='middle' fill='white'>OT</text>
</svg>">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{--blue:#1a56db;--gray:#6b7280;--bg:#f9fafb;--card:#fff}
body{margin:0;font-family:system-ui;background:var(--bg)}
.view{display:none;padding-bottom:90px}

/* PROFILE */
.profile-card{background:#fff;margin:16px;padding:20px;border-radius:16px;text-align:center}
.avatar{width:70px;height:70px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;margin:auto}
.name{font-weight:700}
.username,.email{font-size:13px;color:var(--gray)}
.badge{margin-top:6px;font-size:12px;background:#eef2ff;color:var(--blue);padding:4px 8px;border-radius:20px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
.stat{background:#f3f4f6;padding:10px;border-radius:10px;text-align:center}

/* BUTTON */
.center{text-align:center}
.btn{margin-top:12px;padding:10px 20px;border:none;border-radius:10px;background:var(--blue);color:#fff;cursor:pointer}

/* MODAL */
#edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
.modal-box{background:#fff;width:90%;max-width:360px;padding:20px;border-radius:14px}
input,select{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px}

/* CARD */
.card{background:#fff;margin:16px;padding:15px;border-radius:12px}
.item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}

/* NAV */
.bottom-nav{position:fixed;bottom:0;width:100%;background:#fff;border-top:1px solid #eee;display:flex}
.nav-item{flex:1;text-align:center;padding:10px}
.nav-item i{font-size:20px;color:var(--gray)}
.nav-item.active i{color:var(--blue)}
</style>
</head>

<body>

<div class="view" id="view-profile">

<div class="profile-card">
  <div class="avatar" id="avatar">U</div>
  <div class="name" id="name">Loading...</div>
  <div id="verify-badge"></div>
  <div class="username" id="username"></div>
  <div class="email" id="email"></div>

  <div class="badge" id="country">🌍</div>

  <div class="stats">
    <div class="stat"><b id="tasks">0</b><br>Tasks</div>
    <div class="stat"><b id="earnings">$0</b><br>Earnings</div>
    <div class="stat"><b id="members">0</b><br>Members</div>
    <div class="stat"><b id="since">—</b><br>Joined</div>
  </div>
</div>

<div class="center">
  <button class="btn" onclick="openEditModal()">
    <i class="bi bi-pencil"></i> Edit Profile
  </button>
</div>

<!-- EDIT MODAL -->
<div id="edit-modal">
  <div class="modal-box">
    <h3>Edit Profile</h3>

    <input id="edit-name" placeholder="Full name">
    <input id="edit-username" placeholder="Username">

    <select id="edit-country"></select>

    <input id="edit-paypal" placeholder="PayPal Email">

    <button class="btn" onclick="saveProfile()">Save</button>
    <button class="btn" style="background:#eee;color:#000" onclick="closeEditModal()">Cancel</button>
  </div>
</div>

<!-- PAYMENT -->
<div class="card">
  <b>Payment</b>
  <div class="item">
    <span><i class="bi bi-paypal"></i> PayPal</span>
    <span id="paypal-email"></span>
  </div>
</div>

<!-- ACTIVITY -->
<div class="card">
  <b>Activity</b>
  <div id="activity-list"></div>
</div>

<div class="btn" onclick="logout()" style="background:red">Sign Out</div>

</div>

<script>
const db = supabase.createClient(
"https://lwnbfjjsstxkyexeojcl.supabase.co",
"sb_publishable_Pj9ocGkssu5Gh6qZXFnZQQ_LdghnZt9"
);

let currentUser;

/* FLAGS */
function getFlag(name){
const map={
"Kenya":"🇰🇪","Nigeria":"🇳🇬","USA":"🇺🇸",
"United States":"🇺🇸","UK":"🇬🇧","United Kingdom":"🇬🇧"
};
return map[name]||"🌍";
}

/* COUNTRIES */
const countries=["Kenya","Nigeria","USA","United Kingdom","India","Canada","Germany","France"];
function loadCountries(selected=""){
const s=document.getElementById("edit-country");
s.innerHTML="";
countries.forEach(c=>{
const o=document.createElement("option");
o.value=c;
o.textContent=getFlag(c)+" "+c;
if(c===selected)o.selected=true;
s.appendChild(o);
});
}

/* INIT */
document.addEventListener("DOMContentLoaded", async()=>{
document.getElementById("view-profile").style.display="block";

const {data}=await db.auth.getUser();
if(!data.user) return location.href="index.html";

currentUser=data.user;

loadProfile();
loadStats();
loadActivity();
});

/* PROFILE */
async function loadProfile(){
const {data}=await db.from("profiles")
.select("*").eq("id",currentUser.id).single();

if(!data) return;

document.getElementById("name").textContent=data.full_name;
document.getElementById("username").textContent="@"+data.username;
document.getElementById("email").textContent=currentUser.email;

document.getElementById("avatar").textContent=data.full_name?.[0]||"U";
document.getElementById("country").textContent=getFlag(data.country)+" "+data.country;

document.getElementById("paypal-email").textContent=data.paypal_email||currentUser.email;
document.getElementById("since").textContent=new Date(currentUser.created_at).getFullYear();
}

/* STATS */
async function loadStats(){
const {data}=await db.from("user_tasks").select("*").eq("user_id",currentUser.id);
document.getElementById("tasks").textContent=data?.length||0;
}

/* ACTIVITY */
async function loadActivity(){
const {data}=await db.from("activities")
.select("*").eq("user_id",currentUser.id).limit(5);

document.getElementById("activity-list").innerHTML=
data?.map(a=>`<div class="item"><span>${a.title}</span></div>`).join("")||"No activity";
}

/* EDIT */
function openEditModal(){
document.getElementById("edit-modal").style.display="flex";

db.from("profiles").select("*").eq("id",currentUser.id).single()
.then(({data})=>{
document.getElementById("edit-name").value=data.full_name||"";
document.getElementById("edit-username").value=data.username||"";
document.getElementById("edit-paypal").value=data.paypal_email||"";
loadCountries(data.country);
});
}

function closeEditModal(){
document.getElementById("edit-modal").style.display="none";
}

/* SAVE */
async function saveProfile(){
const full_name=document.getElementById("edit-name").value;
const username=document.getElementById("edit-username").value;
const country=document.getElementById("edit-country").value;
const paypal=document.getElementById("edit-paypal").value;

await db.auth.updateUser({data:{full_name,username,country,paypal}});

await db.from("profiles").update({
full_name,username,country,paypal_email:paypal
}).eq("id",currentUser.id);

alert("Updated");
closeEditModal();
loadProfile();
}

/* LOGOUT */
async function logout(){
await db.auth.signOut();
location.href="index.html";
}
</script>

</body>
</html>
