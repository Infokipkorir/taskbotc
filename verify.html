<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f6f8fb;
  padding:20px;
}

.card{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:16px;
  padding:22px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{font-size:18px;margin-bottom:6px}
p{font-size:13px;color:#6b7280;margin-bottom:16px}

.input{
  width:100%;
  padding:12px;
  border:1px solid #e5e7eb;
  border-radius:10px;
  margin-bottom:12px;
  outline:none;
}

.input:focus{border-color:#2563eb}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.error{
  color:#ef4444;
  font-size:12px;
  margin-bottom:10px;
  display:none;
}

.success{
  text-align:center;
  display:none;
}

.success i{
  font-size:40px;
  color:#16a34a;
  margin-bottom:10px;
}

.step{display:none}
.step.active{display:block}
</style>
</head>

<body>

<div class="card">

  <!-- STEP 1: OTP -->
  <div class="step active" id="step1">
    <h2>OTP Verification</h2>
    <p>Enter the 5-character code sent to your email</p>

    <input class="input" id="otp" maxlength="5" placeholder="Enter OTP">

    <div class="error" id="otpError">Invalid OTP. Try again.</div>

    <button class="btn" onclick="verifyOTP()">Verify OTP</button>
  </div>

  <!-- STEP 2: PASSWORD -->
  <div class="step" id="step2">
    <h2>New Password</h2>
    <p>Set your new password</p>

    <input class="input" id="pass" type="password" placeholder="New Password">
    <input class="input" id="confirm" type="password" placeholder="Confirm Password">

    <div class="error" id="passError">Passwords do not match</div>

    <button class="btn" onclick="resetPassword()">Update Password</button>
  </div>

  <!-- SUCCESS -->
  <div class="success" id="success">
    <i class="bi bi-check-circle-fill"></i>
    <h2>Password Updated</h2>
    <p>You can now login</p>
  </div>

</div>

<script>

/* =========================
   OTP GENERATION (REAL LOGIC)
========================= */
let generatedOTP = "";

function generateOTP(){
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let otp = "";
  for(let i=0;i<5;i++){
    otp += chars[Math.floor(Math.random()*chars.length)];
  }
  return otp;
}

/* SEND OTP (SIMULATED) */
generatedOTP = generateOTP();
console.log("Generated OTP:", generatedOTP); 
// In real system: send via email/SMS

/* =========================
   VERIFY OTP
========================= */
function verifyOTP(){
  const otp = document.getElementById("otp").value.trim();
  const error = document.getElementById("otpError");

  if(otp.length !== 5){
    error.innerText = "OTP must be 5 characters";
    error.style.display="block";
    return;
  }

  if(otp !== generatedOTP){
    error.innerText = "Wrong OTP. Please check and try again.";
    error.style.display="block";
    return;
  }

  error.style.display="none";
  showStep(2);
}

/* =========================
   RESET PASSWORD
========================= */
function resetPassword(){
  const p1 = document.getElementById("pass").value;
  const p2 = document.getElementById("confirm").value;
  const error = document.getElementById("passError");

  if(!p1 || !p2){
    error.innerText = "Fill all fields";
    error.style.display="block";
    return;
  }

  if(p1 !== p2){
    error.innerText = "Passwords do not match";
    error.style.display="block";
    return;
  }

  error.style.display="none";

  document.querySelector(".card").style.display="none";
  document.getElementById("success").style.display="block";
}

/* =========================
   STEP CONTROL
========================= */
function showStep(n){
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
  document.getElementById("step"+n).classList.add("active");
}

</script>

</body>
</html>
