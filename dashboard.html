<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTasks</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
  display:flex;
  background:#f6f8fb;
  color:#111827;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#0f172a;
  color:#fff;
  height:100vh;
  padding:20px;
  transition:0.3s;
}
.sidebar.hide{width:80px}

.logo{
  font-size:20px;
  font-weight:600;
  margin-bottom:30px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu-item{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}
.menu-item:hover{background:#1e293b}

/* MAIN */
.main{
  flex:1;
  transition:0.3s;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
  background:#fff;
  border-bottom:1px solid #e5e7eb;
}

.left{
  display:flex;
  align-items:center;
  gap:15px;
}

.toggle{
  font-size:20px;
  cursor:pointer;
}

/* RIGHT */
.right{
  display:flex;
  align-items:center;
  gap:20px;
}

/* BALANCE */
.balance{
  background:#2563eb;
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
  font-weight:500;
}

/* BELL */
.bell{
  position:relative;
  font-size:18px;
  cursor:pointer;
}
.badge{
  position:absolute;
  top:-6px;
  right:-8px;
  background:#ef4444;
  color:#fff;
  font-size:10px;
  padding:2px 5px;
  border-radius:50%;
}

/* USER */
.user{
  display:flex;
  align-items:center;
  gap:10px;
}
.avatar{
  width:34px;height:34px;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
}

/* CONTENT */
.content{
  padding:24px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  padding:18px;
  border-radius:14px;
  border:1px solid #eee;
}
.card h4{
  font-size:13px;
  color:#6b7280;
}
.card h2{
  margin-top:6px;
  font-size:22px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="logo">OneTasks</div>

  <div class="menu">
    <div class="menu-item" onclick="go('dashboard')">Dashboard</div>
    <div class="menu-item" onclick="go('tasks')">Tasks</div>
    <div class="menu-item" onclick="go('mytasks')">My Tasks</div>
    <div class="menu-item" onclick="go('referrals')">Referrals</div>
    <div class="menu-item" onclick="go('withdraw')">Withdraw</div>
    <div class="menu-item" onclick="logout()">Logout</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">

    <div class="left">
      <div class="toggle" onclick="toggleSidebar()">☰</div>
      <h3>Dashboard</h3>
    </div>

    <div class="right">
      <div class="balance" id="balance">$0.00</div>

      <div class="bell">
        🔔
        <div class="badge" id="notif">0</div>
      </div>

      <div class="user">
        <div class="avatar" id="avatar">U</div>
        <span id="username">User</span>
      </div>
    </div>

  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="cards">
      <div class="card">
        <h4>Total Earnings</h4>
        <h2 id="earnings">$0.00</h2>
      </div>

      <div class="card">
        <h4>Completed Tasks</h4>
        <h2 id="completed">0</h2>
      </div>

      <div class="card">
        <h4>Pending Tasks</h4>
        <h2 id="pending">0</h2>
      </div>

      <div class="card">
        <h4>Referrals</h4>
        <h2 id="referrals">0</h2>
      </div>
    </div>

  </div>

</div>

<script>
const db = supabase.createClient(
  "https://lwnbfjjsstxkyexeojcl.supabase.co",
  "YOUR_PUBLIC_KEY"
);

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("hide");
}

/* LOAD */
async function load(){
  const { data:{ session } } = await db.auth.getSession();
  if(!session){ location.href="index.html"; return; }

  const user = session.user;

  const { data: profile } = await db
    .from("users")
    .select("*")
    .eq("id", user.id)
    .single();

  document.getElementById("username").textContent = profile.full_name;
  document.getElementById("balance").textContent = "$"+profile.balance;
  document.getElementById("earnings").textContent = "$"+profile.balance;

  document.getElementById("avatar").textContent =
    profile.full_name.split(" ").map(n=>n[0]).join("");

  const { data: tasks } = await db
    .from("user_tasks")
    .select("*")
    .eq("user_id", user.id);

  document.getElementById("completed").textContent =
    tasks.filter(t=>t.status==="completed").length;

  document.getElementById("pending").textContent =
    tasks.filter(t=>t.status==="pending").length;

  document.getElementById("notif").textContent = tasks.length;
}

function go(page){
  const routes={
    dashboard:"dashboard.html",
    tasks:"index.html",
    mytasks:"mytasks.html",
    referrals:"referrals.html",
    withdraw:"withdraw.html"
  };
  location.href = routes[page];
}

async function logout(){
  await db.auth.signOut();
  location.href="index.html";
}

load();
</script>

</body>
</html>
