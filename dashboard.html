<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTasks Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}

/* MAIN */
body{
  background:#f0f2f5;
  display:flex;
  justify-content:center;
}

/* PHONE FRAME */
.phone{
  width:360px;
  background:#fff;
  min-height:100vh;
}

/* HEADER */
.header{
  background:#1a56db;
  color:#fff;
  padding:16px;
}

.balance-card{
  display:flex;
  gap:10px;
  background:rgba(255,255,255,0.15);
  padding:12px;
  border-radius:10px;
  align-items:center;
}

.avatar{
  width:40px;height:40px;
  border-radius:8px;
  background:#e74c3c;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.username{font-size:14px}
.useremail{font-size:11px;opacity:.8}

.balance-value{
  margin-left:auto;
  font-size:18px;
  font-weight:bold;
}

/* ACTIONS */
.actions{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:12px;
}

.action{
  background:#f5f7fa;
  padding:10px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

/* MENU */
.menu{
  margin-top:10px;
}

.menu-item{
  padding:14px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:360px;
  background:#fff;
  display:flex;
  border-top:1px solid #eee;
}

.nav-item{
  flex:1;
  text-align:center;
  padding:10px;
  cursor:pointer;
  font-size:12px;
}

.active{color:#1a56db;font-weight:bold}
</style>
</head>

<body>

<div class="phone">

  <!-- HEADER -->
  <div class="header">
    <h3>OneTasks</h3>

    <div class="balance-card">
      <div class="avatar">U</div>

      <div>
        <div class="username">User</div>
        <div class="useremail">email</div>
      </div>

      <div class="balance-value">$0.00</div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <div class="action" onclick="go('tasks')">Tasks</div>
    <div class="action" onclick="go('mytasks')">My Tasks</div>
    <div class="action" onclick="go('referrals')">Referrals</div>
    <div class="action" onclick="go('withdraw')">Withdraw</div>
  </div>

  <!-- MENU -->
  <div class="menu">
    <div class="menu-item" onclick="go('profile')">Profile</div>
    <div class="menu-item" onclick="go('support')">Support</div>
    <div class="menu-item" onclick="go('settings')">Settings</div>
    <div class="menu-item" onclick="logout()">Sign Out</div>
  </div>

</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="go('tasks')">Tasks</div>
  <div class="nav-item" onclick="go('mytasks')">My Tasks</div>
  <div class="nav-item" onclick="go('support')">Support</div>
  <div class="nav-item" onclick="go('profile')">Profile</div>
</div>

<script>
const db = supabase.createClient(
  "https://lwnbfjjsstxkyexeojcl.supabase.co",
  "YOUR_PUBLIC_KEY"
);

/* LOAD USER */
async function loadUser(){
  const { data:{ user } } = await db.auth.getUser();

  if(!user){
    window.location.href = "index.html";
    return;
  }

  // Fetch DB profile
  const { data: profile } = await db
    .from("users")
    .select("*")
    .eq("id", user.id)
    .single();

  document.querySelector(".username").textContent = profile.full_name;
  document.querySelector(".useremail").textContent = profile.email;
  document.querySelector(".balance-value").textContent = "$" + profile.balance;

  // Avatar initials
  const initials = profile.full_name.split(" ").map(n=>n[0]).join("");
  document.querySelector(".avatar").textContent = initials;
}

/* NAVIGATION */
function go(page){
  const routes = {
    tasks:"index.html",
    mytasks:"mytasks.html",
    referrals:"referrals.html",
    withdraw:"withdraw.html",
    support:"support.html",
    profile:"profile.html",
    settings:"settings.html"
  };

  if(routes[page]){
    window.location.href = routes[page];
  }
}

/* LOGOUT */
async function logout(){
  await db.auth.signOut();
  window.location.href = "index.html";
}

/* INIT */
loadUser();
</script>

</body>
</html>
