<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTasks Dashboard</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  display:flex;
  background:#f6f8fb;
  color:#0f172a;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#0b1220;
  color:#fff;
  height:100vh;
  padding:18px;
  transition:0.3s;
}

.sidebar.hide{
  width:80px;
}

.logo{
  font-size:18px;
  font-weight:600;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* MENU */
.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 12px;
  border-radius:10px;
  cursor:pointer;
  background:#111c33;
  transition:0.2s;
  font-size:13px;
}

.menu-item:hover{
  background:#2563eb;
}

/* blue button style */
.menu-item span{
  display:flex;
  align-items:center;
  gap:10px;
}

.menu-item i{
  font-size:14px;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 18px; /* smaller height */
  background:#fff;
  border-bottom:1px solid #e5e7eb;
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.toggle{
  font-size:18px;
  cursor:pointer;
}

.left h3{
  font-size:14px; /* SMALLER TOP TEXT */
  font-weight:600;
}

/* RIGHT */
.right{
  display:flex;
  align-items:center;
  gap:14px;
}

/* BALANCE */
.balance{
  background:#2563eb;
  color:#fff;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}

/* NOTIF */
.bell{
  position:relative;
  font-size:16px;
  cursor:pointer;
}

.badge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:#ef4444;
  color:#fff;
  font-size:9px;
  padding:2px 5px;
  border-radius:50%;
}

/* USER */
.user{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
}

.avatar{
  width:30px;
  height:30px;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

/* CONTENT */
.content{
  padding:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:16px;
}

.card{
  background:#fff;
  padding:16px;
  border-radius:12px;
  border:1px solid #e5e7eb;
}

.card h4{
  font-size:12px;
  color:#6b7280;
}

.card h2{
  font-size:20px;
  margin-top:6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <div class="logo">
    OneTasks
    <i class="bi bi-x-lg" onclick="toggleSidebar()" style="cursor:pointer"></i>
  </div>

  <div class="menu">

    <div class="menu-item" onclick="go('dashboard')">
      <span><i class="bi bi-speedometer2"></i> Dashboard</span>
      <i class="bi bi-x"></i>
    </div>

    <div class="menu-item" onclick="go('tasks')">
      <span><i class="bi bi-list-task"></i> Tasks</span>
      <i class="bi bi-x"></i>
    </div>

    <div class="menu-item" onclick="go('mytasks')">
      <span><i class="bi bi-check2-square"></i> My Tasks</span>
      <i class="bi bi-x"></i>
    </div>

    <div class="menu-item" onclick="go('referrals')">
      <span><i class="bi bi-people"></i> Referrals</span>
      <i class="bi bi-x"></i>
    </div>

    <div class="menu-item" onclick="go('withdraw')">
      <span><i class="bi bi-cash-stack"></i> Withdraw</span>
      <i class="bi bi-x"></i>
    </div>

    <div class="menu-item" onclick="logout()">
      <span><i class="bi bi-box-arrow-right"></i> Logout</span>
      <i class="bi bi-x"></i>
    </div>

  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">

    <div class="left">
      <div class="toggle" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
      </div>
      <h3>Dashboard</h3>
    </div>

    <div class="right">

      <div class="balance" id="balance">$0.00</div>

      <div class="bell">
        <i class="bi bi-bell"></i>
        <div class="badge" id="notif">0</div>
      </div>

      <div class="user">
        <div class="avatar" id="avatar">U</div>
        <span id="username">User</span>
      </div>

    </div>

  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="cards">

      <div class="card">
        <h4>Total Earnings</h4>
        <h2 id="earnings">$0.00</h2>
      </div>

      <div class="card">
        <h4>Completed Tasks</h4>
        <h2 id="completed">0</h2>
      </div>

      <div class="card">
        <h4>Pending Tasks</h4>
        <h2 id="pending">0</h2>
      </div>

      <div class="card">
        <h4>Referrals</h4>
        <h2 id="referrals">0</h2>
      </div>

    </div>

  </div>

</div>

<script>
const db = supabase.createClient(
  "https://lwnbfjjsstxkyexeojcl.supabase.co",
  "YOUR_PUBLIC_KEY"
);

/* SIDEBAR TOGGLE */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("hide");
}

/* LOAD USER */
async function load(){

  const { data:{ session } } = await db.auth.getSession();
  if(!session){ location.href="index.html"; return; }

  const user = session.user;

  const { data: profile } = await db
    .from("users")
    .select("*")
    .eq("id", user.id)
    .single();

  document.getElementById("username").textContent = profile.full_name;
  document.getElementById("balance").textContent = "$"+profile.balance;
  document.getElementById("earnings").textContent = "$"+profile.balance;

  document.getElementById("avatar").textContent =
    profile.full_name.split(" ").map(n=>n[0]).join("");

  const { data: tasks } = await db
    .from("user_tasks")
    .select("*")
    .eq("user_id", user.id);

  document.getElementById("completed").textContent =
    tasks.filter(t=>t.status==="completed").length;

  document.getElementById("pending").textContent =
    tasks.filter(t=>t.status==="pending").length;

  document.getElementById("notif").textContent = tasks.length;
}

/* ROUTES */
function go(page){
  const routes={
    dashboard:"dashboard.html",
    tasks:"index.html",
    mytasks:"mytasks.html",
    referrals:"referrals.html",
    withdraw:"withdraw.html"
  };
  location.href = routes[page];
}

/* LOGOUT */
async function logout(){
  await db.auth.signOut();
  location.href="index.html";
}

load();
</script>

</body>
</html>
