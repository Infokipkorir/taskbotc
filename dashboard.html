<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTasks Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

/* LAYOUT */
body{display:flex;background:#f4f6fb}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#111827;
  color:#fff;
  height:100vh;
  padding:20px;
  position:fixed;
  transition:0.3s;
}
.sidebar.hide{width:70px}

.logo{font-size:18px;font-weight:bold;margin-bottom:20px}

.menu-item{
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:6px;
}
.menu-item:hover{background:#1f2937}

/* MAIN */
.main{
  margin-left:240px;
  flex:1;
  transition:0.3s;
}
.main.full{margin-left:70px}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#fff;
  border-bottom:1px solid #eee;
}

.toggle{
  cursor:pointer;
  font-size:18px;
}

/* RIGHT */
.right{
  display:flex;
  align-items:center;
  gap:15px;
}

/* BALANCE */
.balance{
  background:#2563eb;
  color:#fff;
  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
}

/* NOTIFICATION */
.bell{
  position:relative;
  cursor:pointer;
}
.count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:50%;
}

/* USER */
.user{
  display:flex;
  align-items:center;
  gap:8px;
}
.avatar{
  width:32px;height:32px;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* CONTENT */
.content{
  padding:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}
.card h4{font-size:13px;color:#777}
.card h2{margin-top:5px}

/* MOBILE */
@media(max-width:768px){
  .sidebar{position:absolute;z-index:10}
  .main{margin-left:0}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="logo">OneTasks</div>

  <div class="menu-item" onclick="go('tasks')">Dashboard</div>
  <div class="menu-item" onclick="go('mytasks')">My Tasks</div>
  <div class="menu-item" onclick="go('referrals')">Referrals</div>
  <div class="menu-item" onclick="go('withdraw')">Withdraw</div>
  <div class="menu-item" onclick="go('support')">Support</div>
  <div class="menu-item" onclick="logout()">Logout</div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="toggle" onclick="toggleSidebar()">☰</div>

    <div class="right">
      <div class="balance" id="balance">$0.00</div>

      <div class="bell">
        🔔
        <div class="count" id="notifCount">0</div>
      </div>

      <div class="user">
        <div class="avatar" id="avatar">U</div>
        <span id="username">User</span>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="cards">
      <div class="card">
        <h4>Total Earnings</h4>
        <h2 id="earnings">$0.00</h2>
      </div>

      <div class="card">
        <h4>Tasks Completed</h4>
        <h2 id="completed">0</h2>
      </div>

      <div class="card">
        <h4>Pending Tasks</h4>
        <h2 id="pending">0</h2>
      </div>

      <div class="card">
        <h4>Referrals</h4>
        <h2 id="referrals">0</h2>
      </div>
    </div>

  </div>

</div>

<script>
const db = supabase.createClient(
  "https://lwnbfjjsstxkyexeojcl.supabase.co",
  "YOUR_PUBLIC_KEY"
);

/* TOGGLE SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("hide");
  document.getElementById("main").classList.toggle("full");
}

/* LOAD DATA */
async function loadDashboard(){

  const { data: { session } } = await db.auth.getSession();

  if(!session){
    window.location.href="index.html";
    return;
  }

  const user = session.user;

  // profile
  const { data: profile } = await db
    .from("users")
    .select("*")
    .eq("id", user.id)
    .single();

  document.getElementById("username").textContent = profile.full_name;
  document.getElementById("balance").textContent = "$" + profile.balance;
  document.getElementById("earnings").textContent = "$" + profile.balance;

  // avatar
  document.getElementById("avatar").textContent =
    profile.full_name.split(" ").map(n=>n[0]).join("");

  // tasks
  const { data: tasks } = await db
    .from("user_tasks")
    .select("*")
    .eq("user_id", user.id);

  document.getElementById("completed").textContent =
    tasks.filter(t=>t.status==="completed").length;

  document.getElementById("pending").textContent =
    tasks.filter(t=>t.status==="pending").length;

  // notifications (example)
  document.getElementById("notifCount").textContent = tasks.length;
}

/* NAV */
function go(page){
  const routes={
    tasks:"dashboard.html",
    mytasks:"mytasks.html",
    referrals:"referrals.html",
    withdraw:"withdraw.html",
    support:"support.html"
  };
  window.location.href = routes[page];
}

/* LOGOUT */
async function logout(){
  await db.auth.signOut();
  window.location.href="index.html";
}

/* AUTH LISTENER */
db.auth.onAuthStateChange((event, session)=>{
  if(!session){
    window.location.href="index.html";
  }
});

loadDashboard();
</script>

</body>
</html>
